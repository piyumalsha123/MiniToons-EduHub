<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | MiniToons EduHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --pastel-blue: #A2D2FF;
            --pastel-pink: #fda8c4;
            --dark-navy: #2D3436;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #e1f5fe 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .reset-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .icon-box {
            width: 70px;
            height: 70px;
            background: var(--pastel-blue);
            color: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 20px;
        }

        .form-title {
            font-family: 'Fredoka', cursive;
            color: var(--dark-navy);
            margin-bottom: 10px;
        }

        .instruction-text {
            color: #636e72;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .input-group-custom {
            text-align: left;
            margin-bottom: 15px;
        }

        .input-group-custom label {
            font-weight: 700;
            font-size: 0.8rem;
            color: #636e72;
            margin-left: 10px;
            margin-bottom: 5px;
            display: block;
        }

        .form-control-custom {
            width: 100%;
            padding: 12px 20px;
            border-radius: 20px;
            border: 2px solid #f1f2f6;
            background: #f8f9fa;
            font-size: 0.9rem;
            font-weight: 600;
            outline: none;
            transition: 0.3s;
        }

        .form-control-custom:focus {
            border-color: var(--pastel-pink);
            background: white;
        }

        .btn-reset {
            background: var(--pastel-pink);
            color: white;
            width: 100%;
            padding: 14px;
            border-radius: 50px;
            border: none;
            font-family: 'Fredoka', cursive;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(255, 133, 161, 0.2);
            margin-top: 10px;
        }

        .btn-reset:hover {
            transform: translateY(-2px);
            background: #ff6b81;
        }

        .back-link {
            margin-top: 20px;
            display: block;
            color: var(--dark-navy);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="reset-card">
    <div class="icon-box">
        <i class="bi bi-key-fill"></i>
    </div>

    <h3 class="form-title">Reset Password</h3>
    <p class="instruction-text">Verify your account and set a new password.</p>

    <form action="/api/v1/auth/reset-password-simple" method="POST">
        <div class="input-group-custom">
            <label>Registered Email</label>
            <input type="email" name="email" class="form-control-custom" placeholder="example@mail.com" required>
        </div>

        <div class="input-group-custom">
            <label>Security Answer (What is your child's favorite color?)</label>
            <input type="text" name="securityAnswer" class="form-control-custom" placeholder="Your Answer" required>
        </div>

        <hr style="opacity: 0.1; margin: 25px 0;">

        <div class="input-group-custom">
            <label>New Password</label>
            <input type="password" name="newPassword" class="form-control-custom" placeholder="••••••••" required>
        </div>

        <div class="input-group-custom">
            <label>Confirm New Password</label>
            <input type="password" name="confirmPassword" class="form-control-custom" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-reset">Update Password ✨</button>
    </form>

    <a href="signin.html" class="back-link">
        <i class="bi bi-arrow-left"></i> Wait, I remember it! Sign In
    </a>
</div>

</body>
</html>
