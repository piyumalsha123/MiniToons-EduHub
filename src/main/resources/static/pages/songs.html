<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Songs | MiniToons EduHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --rainbow-red: #FF5E78; --rainbow-orange: #FF9F43; --rainbow-yellow: #FFD93D; --rainbow-green: #2ecc71; --rainbow-blue: #4D96FF; --rainbow-purple: #927DFF; --dark-navy: #2D3436; --glass: rgba(255, 255, 255, 0.95); }
        body { font-family: 'Quicksand', sans-serif; background: #cfb5f6; min-height: 100vh; margin: 0; }
        .sidebar { background: var(--glass); backdrop-filter: blur(15px); height: 100vh; border-right: 1px solid rgba(0,0,0,0.08); padding: 25px 15px; position: fixed; width: 260px; z-index: 1000; display: flex; flex-direction: column; }
        .nav-link-custom { transition: all 0.3s; border-left: 5px solid transparent; margin-bottom: 5px; font-weight: 700; padding: 10px 18px; border-radius: 12px; display: flex; align-items: center; text-decoration: none; color: #636e72; font-size: 0.95rem; }
        .nav-songs.active { color: var(--rainbow-blue) !important; background: rgba(77, 150, 255, 0.08); border-left-color: var(--rainbow-blue); }
        .main-content { margin-left: 260px; padding: 35px; }
        .song-card { background: white; border-radius: 30px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.04); transition: 0.3s ease; border: none; height: 100%; display: flex; flex-direction: column; }
        .song-card:hover { transform: translateY(-8px); }
        .song-img-top { height: 140px; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; background: #e0f2fe; }
        .btn-play { border-radius: 12px; font-weight: 800; padding: 10px; width: 100%; border: none; color: white; margin-top: auto; background: var(--rainbow-blue); }
        /* Profile Info in Sidebar */
        .profile-box { background: rgba(0,0,0,0.03); border-radius: 20px; padding: 15px; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>
<div class="sidebar shadow-sm">
    <div class="profile-box">
        <div class="fs-2">👦</div>
        <h6 class="fw-bold mb-0 mt-2">Little Piyum</h6>
        <small class="text-muted">Explorer Level 5</small>
    </div>
    <nav class="nav-links">
        <a href="dashboard.html" class="nav-link-custom"><i class="bi bi-grid-1x2-fill"></i> <span>Dashboard</span></a>
        <a href="lessons.html" class="nav-link-custom"><i class="bi bi-book-half"></i> <span>Lessons</span></a>
        <a href="#" class="nav-link-custom nav-songs active"><i class="bi bi-music-note-beamed"></i> <span>Fun Songs</span></a>
        <a href="cartoons.html" class="nav-link-custom"><i class="bi bi-play-circle-fill"></i> <span>Cartoons</span></a>
        <a href="quizzes.html" class="nav-link-custom"><i class="bi bi-trophy-fill"></i> <span>Quizzes</span></a>
    </nav>
</div>
<div class="main-content">
    <h2 class="fw-bold mb-1" style="color: var(--dark-navy); font-family: 'Fredoka';">Musical Time 🎵</h2>
    <p class="text-muted fw-bold">Sing and dance with our favorite tunes!</p>
    <div class="row g-4 mt-2">
        <div class="col-md-4">
            <div class="song-card">
                <div class="song-img-top">🐘</div>
                <div class="p-4">
                    <h5 class="fw-bold">Elephant Song</h5>
                    <button class="btn-play">Sing Now 🎤</button>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="song-card">
                <div class="song-img-top">🚌</div>
                <div class="p-4">
                    <h5 class="fw-bold">Wheels on the Bus</h5>
                    <button class="btn-play">Sing Now 🎤</button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
