<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Kingdom | MiniToons EduHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

    <style>
        :root {
            --rainbow-red: #FF5E78; --rainbow-orange: #FF9F43; --rainbow-yellow: #FFD93D;
            --rainbow-green: #2ecc71; --rainbow-blue: #4D96FF; --rainbow-purple: #927DFF;
            --dark-navy: #2D3436; --glass: rgba(255, 255, 255, 0.95);

            /* Lesson Specific Colors */
            --ps-green: #E8F5E9; --txt-green: #2E7D32;
            --ps-yellow: #FFF9C4; --txt-yellow: #F9A825;
            --ps-blue: #E1F5FE;     --txt-blue: #0288D1;
            --ps-brown: #EFEBE9;   --txt-brown: #6D4C41;
            --ps-pink: #FCE4EC;   --txt-pink: #D81B60;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle, #9df176 0%, #bae4a5 100%);
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .sidebar {
            background: var(--glass); backdrop-filter: blur(15px); height: 100vh;
            border-right: 1px solid rgba(0,0,0,0.08); padding: 25px 15px;
            position: fixed; width: 260px; z-index: 1000; display: flex; flex-direction: column;
        }
        .sidebar-brand { font-family: 'Fredoka', cursive; text-align: center; margin-bottom: 25px; text-decoration: none; display: block; }
        .brand-text { display: flex; justify-content: center; line-height: 1; font-size: 2.2rem; font-weight: bolder; }

        .child-profile-box { text-align: center; background: white; border-radius: 25px; padding: 15px; margin-bottom: 20px; border: 2px solid rgba(0,0,0,0.03); transition: 0.3s; cursor: pointer; }
        .child-profile-box:hover { transform: scale(1.03); }
        .avatar-img { width: 65px; height: 65px; background: #f0f4f8; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; margin: 0 auto 10px; border: 3px solid var(--rainbow-blue); }

        .nav-link-custom { transition: all 0.3s; border-left: 5px solid transparent; margin-bottom: 5px; font-weight: 700; padding: 10px 18px; border-radius: 12px; display: flex; align-items: center; text-decoration: none; color: #636e72; font-size: 0.95rem; }
        .nav-link-custom i { font-size: 1.1rem; margin-right: 12px; }
        .nav-lessons.active { color: var(--rainbow-red) !important; background: rgba(255, 94, 120, 0.08); border-left-color: var(--rainbow-red); }

        .nav-link-custom:hover {
            color: var(--rainbow-purple) !important;
            background: rgba(146, 125, 255, 0.08);
            border-left-color: var(--rainbow-purple);
            transform: translateX(5px);
        }

        .logout-container {
            margin-top: auto;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 15px;
        }

        .btn-logout {
            color: var(--rainbow-red) !important;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            padding: 12px 18px;
            border-radius: 12px;
            transition: 0.3s;
        }
        .btn-logout:hover { background: rgba(255, 94, 120, 0.08); transform: translateX(5px); }

        .main-content { margin-left: 260px; padding: 35px; }

        .lesson-container {
            max-width: 1100px;
            margin: 0 auto;
            text-align: center;
        }

        .main-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(to right, #2E7D32, #689F38, #FBC02D, #EF6C00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            filter: drop-shadow(2px 2px 0px white);
            display: block;
        }

        .animal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .animal-card {
            height: 140px;
            border-radius: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 0 rgba(0,0,0,0.05);
            border: 5px solid white;
            position: relative;
        }

        .animal-card:hover {
            transform: translateY(-10px) rotate(3deg);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .animal-emoji { font-size: 4rem; }
        .animal-name { font-family: 'Fredoka'; font-weight: 700; font-size: 1.2rem; margin-top: 5px; }

        .t-green { background: var(--ps-green); color: var(--txt-green); }
        .t-yellow { background: var(--ps-yellow); color: var(--txt-yellow); }
        .t-blue { background: var(--ps-blue); color: var(--txt-blue); }
        .t-brown { background: var(--ps-brown); color: var(--txt-brown); }
        .t-pink { background: var(--ps-pink); color: var(--txt-pink); }

        .back-btn {
            margin-top: 20px;
            padding: 12px 35px;
            border-radius: 50px;
            background: white;
            color: #2E7D32;
            text-decoration: none;
            font-weight: 700;
            display: inline-block;
            transition: 0.3s;
            border: 3px solid #E8F5E9;
        }

        .back-btn:hover {
            background: #E8F5E9;
            transform: scale(1.05);
        }

        #finishLessonBtn {
            border-radius: 50px;
            font-family: 'Fredoka', sans-serif;
            padding: 15px 40px;
            font-size: 1.6rem;
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3);
            transition: 0.3s;
            border: none;
            background: linear-gradient(45deg, #2ecc71, #27ae60);
        }
        #finishLessonBtn:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 25px rgba(46, 204, 113, 0.4);
        }

        /* Modal */
        .modal-content { border-radius: 50px; border: none; }
        .modal-animal { font-size: 6rem; }
        .modal-title-custom { font-family: 'Fredoka'; font-size: 3.5rem; }
        .pill {
            padding: 8px 20px; border-radius: 30px;
            background: #f8f9fa; font-weight: 700;
            display: inline-block; margin: 5px;
        }

        /* නොබලපු සතුන් සඳහා "New" Badge එකක් */
        .new-badge {
            position: absolute;
            top: 5px;
            right: 15px;
            background: #FF5E78;
            color: white;
            font-size: 0.8rem;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 700;
        }

        @media (max-width: 992px) { .sidebar { width: 80px; } .sidebar span, .brand-text, .child-profile-box h6, .child-profile-box small { display: none; } .main-content { margin-left: 80px; } }
    </style>
</head>
<body>

<div class="sidebar shadow-sm">
    <a href="#" class="sidebar-brand">
        <div class="brand-text">
            <span style="color: var(--rainbow-red);">M</span><span style="color: var(--rainbow-orange);">i</span><span style="color: var(--rainbow-yellow);">n</span><span style="color: var(--rainbow-green);">i</span><span style="color: var(--rainbow-blue);">T</span><span style="color: var(--rainbow-purple);">oons</span>
        </div>
        <div class="brand-text" style="font-size:1.8rem; margin-top:-5px;">
            <span style="color: var(--dark-navy);">Edu</span><span style="color: var(--rainbow-blue);">Hub</span>🌈
        </div>
    </a>

    <a href="profile.html" class="text-decoration-none">
        <div class="child-profile-box shadow-sm">
            <div class="avatar-img" id="sidebar-avatar">👦</div>
            <h6 class="fw-bold mb-0" style="color: var(--dark-navy);" id="sidebar-name">Little Adventurer</h6>
            <small class="text-muted fw-bold" id="sidebar-level">Explorer</small>
        </div>
    </a>

    <nav class="nav-links">
        <a href="child-dashboard.html" class="nav-link-custom nav-dashboard"><i class="bi bi-grid-1x2-fill"></i> <span>Dashboard</span></a>
        <a href="lessons.html" class="nav-link-custom nav-lessons active"><i class="bi bi-book-half"></i> <span>Lessons</span></a>
        <a href="songs.html" class="nav-link-custom nav-songs"><i class="bi bi-music-note-beamed"></i> <span>Fun Songs</span></a>
        <a href="cartoons.html" class="nav-link-custom nav-cartoons"><i class="bi bi-play-circle-fill"></i> <span>Cartoons</span></a>
        <a href="quizzes.html" class="nav-link-custom nav-quizzes"><i class="bi bi-trophy-fill"></i> <span>Quizzes</span></a>
    </nav>

    <div class="logout-container">
        <a href="index.html" class="btn-logout" id="logout-btn">
            <i class="bi bi-box-arrow-right me-2"></i> <span>Logout</span>
        </a>
    </div>
</div>

<div class="main-content">
    <div class="lesson-container">
        <h1 class="main-title animate__animated animate__pulse animate__infinite">Animal Kingdom</h1>
        <p class="lead fw-bold text-muted" id="welcome-text">Click an animal to see their magic! 🦁</p>

        <div class="alert alert-light d-inline-block rounded-pill fw-bold py-2 px-4 shadow-sm mb-3" id="progressInfo" style="color: #2E7D32;">
            Tap all animals to unlock the Lesson! 🔓 (0/10)
        </div>

        <div class="animal-grid" id="animalGrid"></div>

        <div class="text-center mt-5 mb-3">
            <button id="finishLessonBtn" class="btn btn-success btn-lg fw-bold animate__animated animate__bounceIn" disabled style="opacity: 0.6; cursor: not-allowed;">
                I Finished the Lesson! 🎉
            </button>
        </div>

        <a href="lessons.html" class="back-btn">
            <i class="bi bi-chevron-left me-2"></i> Back to Lessons
        </a>
    </div>
</div>

<div class="modal fade" id="animalModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content animate__animated animate__zoomIn">
            <div class="modal-body text-center p-5">
                <button type="button" class="btn-close float-end" data-bs-dismiss="modal" aria-label="Close"></button>
                <div id="mEmoji" class="modal-animal animate__animated animate__tada animate__infinite animate__slow"></div>
                <h2 id="mName" class="modal-title-custom"></h2>
                <div class="mt-3">
                    <span class="pill" id="mSound" style="color: #FF5722;"></span>
                    <span class="pill" id="mHome" style="color: #4CAF50;"></span>
                </div>
                <p id="mFact" class="mt-4 fw-bold text-muted italic"></p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    const animals = [
        { name: "Lion", emoji: "🦁", sound: "Roar!", home: "Jungle", theme: "t-yellow", fact: "The Lion is the king of the jungle!" },
        { name: "Elephant", emoji: "🐘", sound: "Pawoo!", home: "Savanna", theme: "t-blue", fact: "Elephants have the biggest ears!" },
        { name: "Monkey", emoji: "🐒", sound: "Ooh-Ooh!", home: "Trees", theme: "t-brown", fact: "Monkeys love to eat bananas!" },
        { name: "Panda", emoji: "🐼", sound: "Growl!", home: "Forest", theme: "t-brown", fact: "Pandas love to eat green bamboo!" },
        { name: "Cow", emoji: "🐮", sound: "Moo!", home: "Farm", theme: "t-pink", fact: "Cows give us healthy milk!" },
        { name: "Dog", emoji: "🐶", sound: "Woof!", home: "House", theme: "t-yellow", fact: "Dogs are very loyal friends!" },
        { name: "Rabbit", emoji: "🐰", sound: "Squeak!", home: "Garden", theme: "t-green", fact: "Rabbits can jump very high!" },
        { name: "Giraffe", emoji: "🦒", sound: "Hum!", home: "Savanna", theme: "t-yellow", fact: "Giraffes have very long necks!" },
        { name: "Duck", emoji: "🦆", sound: "Quack!", home: "Pond", theme: "t-blue", fact: "Ducks love to swim in water!" },
        { name: "Zebra", emoji: "🦓", sound: "Whinny!", home: "Savanna", theme: "t-green", fact: "Zebras have black and white stripes!" }
    ];

    const grid = document.getElementById('animalGrid');
    const modal = new bootstrap.Modal(document.getElementById('animalModal'));

    const clickedAnimals = new Set();

    animals.forEach((animal, index) => {
        const card = document.createElement('div');
        card.className = `animal-card ${animal.theme} animate__animated animate__fadeInUp`;
        card.style.animationDelay = `${index * 0.05}s`;

        card.innerHTML = `
            <span class="new-badge" id="badge-${index}">New</span>
            <div class="animal-emoji">${animal.emoji}</div>
            <div class="animal-name">${animal.name}</div>
        `;

        card.onclick = () => {
            document.getElementById('mEmoji').innerText = animal.emoji;
            document.getElementById('mName').innerText = animal.name;
            document.getElementById('mSound').innerText = `🔊 ${animal.sound}`;
            document.getElementById('mHome').innerText = `🏠 ${animal.home}`;
            document.getElementById('mFact').innerText = `"${animal.fact}"`;
            document.getElementById('mName').style.color = window.getComputedStyle(card).color;

            modal.show();

            clickedAnimals.add(animal.name);


            const badge = document.getElementById(`badge-${index}`);
            if (badge) badge.remove();


            document.getElementById('progressInfo').innerText = `Tap all animals to unlock the Lesson! 🔓 (${clickedAnimals.size}/${animals.length})`;


            if(clickedAnimals.size === animals.length) {
                const finishBtn = document.getElementById('finishLessonBtn');
                finishBtn.disabled = false;
                finishBtn.style.opacity = '1';
                finishBtn.style.cursor = 'pointer';
                document.getElementById('progressInfo').innerText = `All animals checked! You can play the Quiz now! 🎉`;
                document.getElementById('progressInfo').className = "alert alert-success d-inline-block rounded-pill fw-bold py-2 px-4 shadow-sm mb-3";
            }
        };
        grid.appendChild(card);
    });

    document.getElementById('finishLessonBtn').addEventListener('click', function() {
        Swal.fire({
            title: 'Wow! You completed the lesson! 🥳',
            text: 'Do you want to play the quiz now?',
            icon: 'success',
            showCancelButton: true,
            confirmButtonColor: '#2ecc71',
            cancelButtonColor: '#FF5E78',
            confirmButtonText: 'Yes, let\'s go! 🚀',
            cancelButtonText: 'Not now'
        }).then((result) => {
            if (result.isConfirmed) {

                window.location.href = "animal-quiz.html";
            } else {
                window.location.href = "child-dashboard.html";
            }
        });
    });

    document.addEventListener("DOMContentLoaded", function() {
        const name = sessionStorage.getItem("childName");
        const gender = sessionStorage.getItem("childGender");
        const level = sessionStorage.getItem("childLevel");

        const nameElement = document.getElementById("sidebar-name");
        const welcomeElement = document.getElementById("welcome-text");

        if (name) {
            if(nameElement) nameElement.innerText = name;
            if(welcomeElement) welcomeElement.innerText = `Hello, ${name}! Click an animal to see their magic! 🦁`;
        }

        const avatarElement = document.getElementById("sidebar-avatar");
        if (gender && avatarElement) {
            const upperGender = gender.toUpperCase();
            if (upperGender === "FEMALE" || upperGender === "GIRL") {
                avatarElement.innerText = "👧";
                avatarElement.style.borderColor = "var(--rainbow-red)";
            } else {
                avatarElement.innerText = "👦";
                avatarElement.style.borderColor = "var(--rainbow-blue)";
            }
        }

        const levelElement = document.getElementById("sidebar-level");
        if (level && levelElement) {
            levelElement.innerText = level;
        }

        const logoutBtn = document.getElementById("logout-btn");
        if(logoutBtn) {
            logoutBtn.addEventListener("click", function() {
                sessionStorage.clear();
            });
        }
    });
</script>
</body>
</html>
