<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counting Fun Quiz | MiniToons</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --rainbow-red: #FF5E78;
            --rainbow-orange: #FF9F43;
            --rainbow-yellow: #FFD93D;
            --rainbow-green: #2ecc71;
            --rainbow-blue: #4D96FF;
            --rainbow-purple: #927DFF;
            --dark-navy: #2D3436;
            --glass: rgba(255, 255, 255, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: #FFD93D; /* Dashboard එකේ පාටමයි */
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* 🚪 Sidebar Styles */
        .sidebar {
            background: var(--glass);
            backdrop-filter: blur(15px);
            height: 100vh;
            border-right: 1px solid rgba(0,0,0,0.08);
            padding: 25px 15px;
            position: fixed;
            width: 260px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-brand { font-family: 'Fredoka', cursive; text-align: center; margin-bottom: 25px; text-decoration: none; display: block; }
        .brand-text { display: flex; justify-content: center; line-height: 1; font-size: 2.2rem; font-weight: bolder; }

        .child-profile-box { text-align: center; background: white; border-radius: 25px; padding: 15px; margin-bottom: 20px; border: 2px solid rgba(0,0,0,0.03); cursor:pointer; }
        .avatar-img { width: 65px; height: 65px; background: #f0f4f8; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; margin: 0 auto 10px; border: 3px solid var(--rainbow-blue); }

        .nav-link-custom { transition: all 0.3s; border-left: 5px solid transparent; margin-bottom: 5px; font-weight: 700; padding: 10px 18px; border-radius: 12px; display: flex; align-items: center; text-decoration: none; color: #636e72; font-size: 0.95rem; }
        .nav-link-custom i { font-size: 1.1rem; margin-right: 12px; }

        .nav-quizzes.active {
            color: var(--rainbow-purple) !important;
            background: rgba(146, 125, 255, 0.08);
            border-left-color: var(--rainbow-purple);
        }

        .nav-link-custom:hover {
            color: var(--rainbow-purple) !important;
            background: rgba(146, 125, 255, 0.08);
            border-left-color: var(--rainbow-purple);
            transform: translateX(5px);
        }

        .logout-container {
            margin-top: auto;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 15px;
        }

        .btn-logout {
            color: var(--rainbow-red) !important;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            padding: 12px 18px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .btn-logout:hover {
            background: rgba(255, 94, 120, 0.08);
            transform: translateX(5px);
        }

        /* 📝 Main Content Area */
        .main-content {
            margin-left: 260px;
            padding: 35px;
            flex: 1;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
        }

        .quiz-container {
            background: white;
            border-radius: 40px;
            border: 8px solid var(--rainbow-blue);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .option-card {
            background: #f8fbff;
            border: 3px solid #e0e9f3;
            border-radius: 20px;
            padding: 15px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 800;
            font-size: 1.8rem;
            color: var(--rainbow-blue);
            text-align: center;
        }

        .option-card:hover {
            transform: scale(1.05);
            border-color: var(--rainbow-blue);
        }

        .progress {
            height: 15px;
            border-radius: 10px;
            background: #eef2f7;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .btn-custom {
            border-radius: 15px;
            font-weight: 800;
            padding: 12px 25px;
            font-size: 1.1rem;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-custom:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        @media (max-width: 992px) {
            .sidebar { width: 80px; }
            .sidebar span, .brand-text { display: none; }
            .main-content { margin-left: 80px; }
        }
    </style>
</head>
<body>

<div class="sidebar shadow-sm">
    <a href="#" class="sidebar-brand">
        <div class="brand-text">
            <span style="color: var(--rainbow-red);">M</span><span style="color: var(--rainbow-orange);">i</span><span style="color: var(--rainbow-yellow);">n</span><span style="color: var(--rainbow-green);">i</span><span style="color: var(--rainbow-blue);">T</span><span style="color: var(--rainbow-purple);">oons</span>
        </div>
        <div class="brand-text" style="font-size:1.8rem; margin-top:-5px;">
            <span style="color: var(--dark-navy);">Edu</span><span style="color: var(--rainbow-blue);">Hub</span>🌈
        </div>
    </a>

    <a href="profile.html" class="text-decoration-none">
        <div class="child-profile-box shadow-sm" style="cursor: pointer; transition: 0.3s;">
            <div class="avatar-img" id="sidebar-avatar">👦</div>
            <h6 class="fw-bold mb-0" style="color: var(--dark-navy);" id="sidebar-name">Little Adventurer</h6>
            <small class="text-muted fw-bold" id="sidebar-level">Explorer</small>
        </div>
    </a>

    <nav class="nav-links">
        <a href="child-dashboard.html" class="nav-link-custom nav-dashboard"><i class="bi bi-grid-1x2-fill"></i> <span>Dashboard</span></a>
        <a href="lessons.html" class="nav-link-custom nav-lessons"><i class="bi bi-book-half"></i> <span>Lessons</span></a>
        <a href="songs.html" class="nav-link-custom nav-songs"><i class="bi bi-music-note-beamed"></i> <span>Fun Songs</span></a>
        <a href="cartoons.html" class="nav-link-custom nav-cartoons"><i class="bi bi-play-circle-fill"></i> <span>Cartoons</span></a>
        <a href="quizzes.html" class="nav-link-custom nav-quizzes active"><i class="bi bi-trophy-fill"></i> <span>Quizzes</span></a>
    </nav>

    <div class="logout-container">
        <a href="index.html" class="btn-logout" id="logout-btn">
            <i class="bi bi-box-arrow-right me-2"></i> <span>Logout</span>
        </a>
    </div>
</div>

<div class="main-content">
    <div class="quiz-container animate__animated animate__jackInTheBox">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="badge bg-primary rounded-pill px-3 py-2 fs-6" id="questionCounter">Question 1/10</span>
            <span class="fw-bold text-primary fs-5"><i class="bi bi-star-fill text-warning"></i> Quiz Time!</span>
        </div>

        <div class="progress mb-4">
            <div id="quizProgress" class="progress-bar progress-bar-striped progress-bar-animated bg-warning" style="width: 10%;"></div>
        </div>

        <div id="quiz-ui">
            <h2 id="q-emoji" class="animate__animated animate__pulse animate__infinite animate__slow" style="font-size: 4.5rem; margin-bottom: 10px;">🍎🍎🍎</h2>
            <h4 class="fw-bold mb-4" style="font-family: 'Fredoka'; color: #2D3436;">How many objects can you see?</h4>

            <div id="options-grid" class="row g-3">
            </div>
        </div>

        <div id="result-ui" class="d-none py-4">
            <h1 style="font-size: 5rem;" class="animate__animated animate__tada animate__infinite">🎉</h1>
            <h2 class="fw-bold" style="font-family: 'Fredoka'; color: var(--rainbow-red);">You are a Genius!</h2>
            <p class="fs-4 fw-bold mb-4">You earned <span id="finalScore" class="text-primary">0</span>/10 Stars!</p>

            <div id="starDisplay" style="font-size: 3rem; color: #FFD93D; margin-bottom: 25px;"></div>

            <div class="d-flex gap-2 justify-content-center">
                <a href="lessons.html" class="btn btn-custom btn-success"><i class="bi bi-book-half me-2"></i>Lessons</a>
                <a href="quizzes.html" class="btn btn-custom btn-primary"><i class="bi bi-trophy-fill me-2"></i>Quizzes</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    const countingData = [
        { emoji: "🍎", count: 3, options: [2, 3, 5, 1] },
        { emoji: "🐱", count: 1, options: [1, 4, 2, 3] },
        { emoji: "⭐️", count: 5, options: [6, 4, 5, 8] },
        { emoji: "🚗", count: 2, options: [2, 1, 3, 5] },
        { emoji: "🦋", count: 7, options: [5, 7, 9, 6] },
        { emoji: "🐘", count: 4, options: [3, 4, 2, 6] },
        { emoji: "🍦", count: 6, options: [6, 7, 5, 8] },
        { emoji: "🎈", count: 10, options: [8, 9, 10, 7] },
        { emoji: "🐣", count: 8, options: [7, 8, 9, 6] },
        { emoji: "🌸", count: 9, options: [10, 8, 9, 7] }
    ];

    let currentQ = 0;
    let score = 0;

    function loadQuestion() {
        const q = countingData[currentQ];
        document.getElementById('questionCounter').innerText = `Question ${currentQ + 1}/10`;
        document.getElementById('quizProgress').style.width = `${((currentQ + 1) / 10) * 100}%`;

        let emojiDisplay = "";
        for(let i=0; i<q.count; i++) emojiDisplay += q.emoji;

        const emojiElement = document.getElementById('q-emoji');
        emojiElement.innerText = emojiDisplay;

        if(q.count > 6) {
            emojiElement.style.fontSize = "3rem";
        } else {
            emojiElement.style.fontSize = "4.5rem";
        }

        const optionsGrid = document.getElementById('options-grid');
        optionsGrid.innerHTML = "";

        q.options.forEach(opt => {
            const col = document.createElement('div');
            col.className = "col-6";
            col.innerHTML = `<div class="option-card" onclick="checkAnswer(${opt}, ${q.count}, this)">${opt}</div>`;
            optionsGrid.appendChild(col);
        });
    }

    function checkAnswer(selected, correct, element) {
        const allOptions = document.querySelectorAll('.option-card');
        allOptions.forEach(opt => opt.style.pointerEvents = "none");

        if (selected === correct) {
            element.style.background = "#2ecc71";
            element.style.color = "white";
            score++;
        } else {
            element.style.background = "#FF5E78";
            element.style.color = "white";
            allOptions.forEach(opt => {
                if(parseInt(opt.innerText) === correct) {
                    opt.style.background = "#2ecc71";
                    opt.style.color = "white";
                }
            });
        }

        setTimeout(() => {
            currentQ++;
            if (currentQ < countingData.length) {
                loadQuestion();
            } else {
                showFinalResults();
            }
        }, 1500);
    }

    function calculateStars(correctAnswers) {
        let percentage = (correctAnswers / 10) * 100;
        if (percentage >= 80) return 3;
        if (percentage >= 50) return 2;
        if (percentage >= 20) return 1;
        return 0;
    }

    function showFinalResults() {
        document.getElementById('quiz-ui').classList.add('d-none');
        document.getElementById('result-ui').classList.remove('d-none');
        document.getElementById('finalScore').innerText = score;

        const stars = calculateStars(score);

        let starEmojis = "";
        for(let i=0; i<stars; i++) starEmojis += "⭐ ";
        if (stars === 0) starEmojis = "Keep practicing! 📚";
        document.getElementById('starDisplay').innerText = starEmojis;

        const childId = sessionStorage.getItem("childId");
        const token = localStorage.getItem("jwtToken");

        // 🚀 [මොඩිෆයි කරපු කොටස] Backend එකට Score එකම Stars විදියට යවනවා
        const progressData = {
            childId: parseInt(childId),
            lessonName: "Counting Fun",
            category: "Maths", // Dashboard එකේ Maths progress bar එකට link වෙනවා
            starsEarned: score, // මෙතනට stars වෙනුවට score එක දැම්මා. එතකොට Dashboard එකේ stars ගාන හරියටම එකතු වෙනවා!
            isCompleted: true   // පාඩම ඉවරයි කියලා දැනගන්න
        };

        fetch('http://localhost:8080/api/progress/save', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(progressData)
        })
            .then(response => {
                if (response.ok) {
                    console.log('Progress saved successfully in backend! 🚀');
                    Swal.fire({
                        title: 'Data Saved! 💾',
                        text: 'Your progress has been recorded successfully.',
                        icon: 'success',
                        timer: 2000,
                        showConfirmButton: false
                    });
                } else {
                    throw new Error('Failed to save score');
                }
            })
            .catch((error) => {
                console.error('Error saving progress:', error);
                Swal.fire({
                    title: 'Oops! ❌',
                    text: 'Failed to save score. Please try again.',
                    icon: 'error'
                });
            });
    }
    // Profile Data Load කිරීම
    document.addEventListener("DOMContentLoaded", function() {
        loadQuestion();

        const name = sessionStorage.getItem("childName");
        const gender = sessionStorage.getItem("childGender");
        const level = sessionStorage.getItem("childLevel");

        const nameElement = document.getElementById("sidebar-name");
        if (name && nameElement) nameElement.innerText = name;

        const avatarElement = document.getElementById("sidebar-avatar");
        if (gender && avatarElement) {
            const upperGender = gender.toUpperCase();
            if (upperGender === "FEMALE" || upperGender === "GIRL") {
                avatarElement.innerText = "👧";
                avatarElement.style.borderColor = "var(--rainbow-red)";
            } else {
                avatarElement.innerText = "👦";
                avatarElement.style.borderColor = "var(--rainbow-blue)";
            }
        }

        const levelElement = document.getElementById("sidebar-level");
        if (level && levelElement) levelElement.innerText = level;

        const logoutBtn = document.getElementById("logout-btn");
        if(logoutBtn) {
            logoutBtn.addEventListener("click", function() {
                sessionStorage.clear();
            });
        }
    });
</script>

</body>
</html>
