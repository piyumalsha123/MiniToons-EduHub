<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join MiniToons | Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --pastel-blue: #A2D2FF;
            --pastel-pink: #fda8c4;
            --pastel-yellow: #FFD93D;
            --soft-purple: #BDB2FF;
            --dark-navy: #ec2997;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #e1f5fe 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .signup-container {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.08);
            max-width: 1100px;
            width: 100%;
            display: flex;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Left Side: Illustration Area */
        .info-side {
            flex: 1.2;
            background: linear-gradient(135deg, var(--pastel-blue), var(--soft-purple));
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
        }

        .info-side h1 {
            font-family: 'Fredoka', cursive;
            font-size: 3.5rem;
            text-shadow: 2px 4px 0px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .info-side p {
            font-size: 1.2rem;
            font-weight: 500;
            text-align: center;
            opacity: 0.9;
        }

        .floating-img {
            width: 80%;
            margin-top: 30px;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.15));
            animation: float 5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(3deg); }
        }

        /* Right Side: Form Area */
        .form-side {
            flex: 1;
            padding: 50px 60px;
            background: white;
            border-radius: 0 50px 50px 0;
        }

        .login-link {
            text-align: right;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .login-link a {
            color: var(--pastel-pink);
            font-weight: 700;
            text-decoration: none;
        }

        .form-title {
            font-family: 'Fredoka', cursive;
            color: var(--dark-navy);
            font-size: 2rem;
            margin-bottom: 30px;
        }

        .input-group-custom {
            margin-bottom: 20px;
        }

        .input-group-custom label {
            font-weight: 700;
            font-size: 0.85rem;
            color: #636e72;
            margin-bottom: 8px;
            display: block;
        }

        .form-control-custom {
            width: 100%;
            padding: 14px 20px;
            border-radius: 20px;
            border: 2px solid #f1f2f6;
            background: #f8f9fa;
            font-size: 0.95rem;
            font-weight: 600;
            transition: 0.3s;
            outline: none;
        }

        .form-control-custom:focus {
            border-color: var(--pastel-blue);
            background: white;
            box-shadow: 0 8px 20px rgba(162, 210, 255, 0.2);
        }

        .btn-join {
            background: hotpink;
            color: white;
            width: 100%;
            padding: 15px;
            border-radius: 50px;
            border: none;
            font-family: 'Fredoka', cursive;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(255, 133, 161, 0.3);
            margin-top: 20px;
        }

        .btn-join:hover {
            transform: translateY(-3px) scale(1.02);
            background: #ff6b81;
            box-shadow: 0 15px 25px rgba(255, 133, 161, 0.4);
        }

        .divider {
            text-align: center;
            margin: 30px 0;
            color: #82b6ca;
            font-size: 0.85rem;
            position: relative;
        }

        .divider::after, .divider::before {
            content: "";
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: #dfe6e9;
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .social-btns {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .social-btn {
            width: 55px;
            height: 55px;
            border-radius: 18px;
            border: 2px solid #f1f2f6;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .social-btn:hover {
            border-color: var(--pastel-blue);
            transform: translateY(-5px);
        }

        /* Responsive */
        @media (max-width: 992px) {
            .signup-container { flex-direction: column; border-radius: 40px; }
            .info-side { padding: 40px; }
            .form-side { border-radius: 0; padding: 40px; }
            .floating-img { width: 50%; }
            .info-side h1 { font-size: 2.5rem; }
        }

        @media (max-width: 1200px) {
            .signup-container { max-width: 950px; }
            .info-side { padding: 40px; }
            .form-side { padding: 40px; }
        }

        /* 2. Tablets & Small Laptops (Max 992px) */
        @media (max-width: 992px) {
            body { padding: 15px; }
            .signup-container {
                flex-direction: column;
                border-radius: 30px;
                max-width: 550px; /* Tablet එකකදී ලස්සනට පේන්න width එක limit කළා */
            }
            .info-side {
                border-radius: 30px 30px 0 0;
                padding: 40px 30px;
            }
            .form-side {
                border-radius: 0 0 30px 30px;
                padding: 40px 30px;
            }
            .floating-img { width: 45%; }
            .info-side h1 { font-size: 2.8rem; }
        }

        /* 3. Mobile Phones (Max 576px) */
        @media (max-width: 576px) {
            body { padding: 10px; }
            .signup-container { border-radius: 20px; }
            .info-side {
                padding: 30px 20px;
                border-radius: 20px 20px 0 0;
            }
            .form-side {
                padding: 30px 20px;
                border-radius: 0 0 20px 20px;
            }
            .info-side h1 { font-size: 2.2rem; }
            .info-side p { font-size: 1rem; }
            .floating-img { width: 60%; }
            .form-title { font-size: 1.6rem; text-align: center; }

            /* Mobile එකේදී Radio buttons ටික පිළිවෙලට පේන්න */
            .input-group-custom .form-check {
                margin-bottom: 8px;
            }

            /* Divider lines mobile එකේදී ඕනෑවට වඩා දික් වෙන එක පාලනය කළා */
            .divider::after, .divider::before { width: 20%; }
        }
    </style>
</head>
<body>

<div class="signup-container">
    <div class="info-side">
        <div class="text-center">
            <h1>MiniToons</h1>
            <p>Join the magical world of learning! 🌈<br>Create an account to start your adventure.</p>
        </div>
        <img src="/src/main/resources/images/WhatsApp%20Image%202025-12-31%20at%2021.11.33.jpeg" alt="Rocket" class="floating-img">
    </div>

    <div class="form-side">
        <div class="login-link">
            Already a member? <a href="signin.html">Log In</a>
        </div>

        <h2 class="form-title">Create Account ✨</h2>

        <form id="signupForm">
            <div class="input-group-custom">
                <label>Parent / Guardian Name</label>
                <input type="text" id="fullName" name="fullName" class="form-control-custom" placeholder="Enter your full name" required>
            </div>

            <div class="input-group-custom">
                <label>Email Address</label>
                <input type="email" id="email" name="email" class="form-control-custom" placeholder="example@gmail.com" required>
            </div>

            <div class="input-group-custom">
                <label>Password</label>
                <input type="password" id="password" name="password" class="form-control-custom" placeholder="Create a strong password" required>
            </div>

            <div class="input-group-custom">
                <label>Select Role</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="role" id="roleParent" value="PARENT" checked>
                    <label class="form-check-label" for="roleParent">Parent</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="role" id="roleAdmin" value="ADMIN">
                    <label class="form-check-label" for="roleAdmin">Admin</label>
                </div>
            </div>

            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="terms" required>
                <label class="form-check-label small text-muted" for="terms">
                    I agree to the <a href="#" class="text-decoration-none">Terms of Service</a> and <a href="#" class="text-decoration-none">Child Safety Policy</a>
                </label>
            </div>

            <button type="submit" class="btn-join">Start Adventure 🚀</button>
        </form>

        <div class="divider">or continue with</div>

        <div class="social-btns">
            <div class="social-btn">
                <img src="https://img.icons8.com/color/30/google-logo.png" alt="Google">
            </div>
            <div class="social-btn">
                <img src="https://img.icons8.com/color/30/facebook-new.png" alt="Facebook">
            </div>
        </div>
    </div>
</div>

</body>
<script>
    document.getElementById("signupForm").addEventListener("submit", async function(e) {
        e.preventDefault(); // ❗ page reload eka stop karanawa


        const role = document.querySelector('input[name="role"]:checked').value;

        const userData = {
            username: document.getElementById("email").value,
            password: document.getElementById("password").value,
            role: role
        };

        try {
            const response = await fetch("http://localhost:8080/api/v1/auth/signup", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(userData)
            });

            const data = await response.json();
            console.log(data);

            if (response.ok) {
                alert("Signup Success 🎉");

                // 👉 login page ekata yanna
                window.location.href = "signin.html";

            } else {
                alert(data.message || "Signup Failed ❌");
            }

        } catch (error) {
            console.error(error);
            alert("Server Error 🚨");
        }
    });
</script>
</html>
