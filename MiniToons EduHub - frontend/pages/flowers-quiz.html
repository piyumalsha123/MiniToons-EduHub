<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Garden Fun | MiniToons</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --rainbow-red: #FF5E78;
            --rainbow-orange: #FF9F43;
            --rainbow-yellow: #FFD93D;
            --rainbow-green: #2ecc71;
            --rainbow-blue: #4D96FF;
            --rainbow-purple: #927DFF;
            --dark-navy: #2D3436;
            --glass: rgba(255, 255, 255, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: #FFB7B2;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }


        .sidebar {
            background: var(--glass);
            backdrop-filter: blur(15px);
            height: 100vh;
            border-right: 1px solid rgba(0,0,0,0.08);
            padding: 25px 15px;
            position: fixed;
            width: 260px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-brand { font-family: 'Fredoka', cursive; text-align: center; margin-bottom: 25px; text-decoration: none; display: block; }
        .brand-text { display: flex; justify-content: center; line-height: 1; font-size: 2.2rem; font-weight: bolder; }

        .child-profile-box { text-align: center; background: white; border-radius: 25px; padding: 15px; margin-bottom: 20px; border: 2px solid rgba(0,0,0,0.03); cursor:pointer; }
        .avatar-img { width: 65px; height: 65px; background: #f0f4f8; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; margin: 0 auto 10px; border: 3px solid var(--rainbow-blue); }

        .nav-link-custom { transition: all 0.3s; border-left: 5px solid transparent; margin-bottom: 5px; font-weight: 700; padding: 10px 18px; border-radius: 12px; display: flex; align-items: center; text-decoration: none; color: #636e72; font-size: 0.95rem; }
        .nav-link-custom i { font-size: 1.1rem; margin-right: 12px; }

        .nav-quizzes.active {
            color: var(--rainbow-purple) !important;
            background: rgba(146, 125, 255, 0.08);
            border-left-color: var(--rainbow-purple);
        }

        .nav-link-custom:hover {
            color: var(--rainbow-green) !important;
            background: rgba(46, 204, 113, 0.08);
            border-left-color: var(--rainbow-green);
            transform: translateX(5px);
        }

        .logout-container {
            margin-top: auto;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 15px;
        }

        .btn-logout {
            color: var(--rainbow-red) !important;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            padding: 12px 18px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .btn-logout:hover {
            background: rgba(255, 94, 120, 0.08);
            transform: translateX(5px);
        }


        .main-content {
            margin-left: 260px;
            padding: 20px;
            flex: 1;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .modal-content {
            border-radius: 40px;
            border: 8px solid #2ecc71;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            background: white;
            max-width: 500px;
            width: 100%;
        }

        .option-card {
            background: #f8fbff; border: 3px solid #e0e9f3; border-radius: 20px;
            padding: 15px; cursor: pointer; transition: 0.3s;
            font-weight: 700; font-size: 1.3rem; color: #2D3436;
            display: flex; align-items: center; justify-content: center;
            min-height: 70px;
        }
        .option-card:hover { transform: scale(1.05); border-color: #FF9F43; background: #fffdf0; }

        .q-image-box {
            font-size: 5rem;
            background: #f0f4f8;
            width: 150px;
            height: 150px;
            margin: 0 auto 15px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 5px dashed #2ecc71;
        }

        .progress { height: 12px; border-radius: 10px; background: #eef2f7; }
        .badge { font-size: 0.9rem; }

        @media (max-width: 992px) { .sidebar { width: 80px; } .sidebar span, .brand-text { display: none; } .main-content { margin-left: 80px; } }
    </style>
</head>
<body>

<div class="sidebar shadow-sm">
    <a href="#" class="sidebar-brand">
        <div class="brand-text">
            <span style="color: var(--rainbow-red);">M</span><span style="color: var(--rainbow-orange);">i</span><span style="color: var(--rainbow-yellow);">n</span><span style="color: var(--rainbow-green);">i</span><span style="color: var(--rainbow-blue);">T</span><span style="color: var(--rainbow-purple);">oons</span>
        </div>
        <div class="brand-text" style="font-size:1.8rem; margin-top:-5px;">
            <span style="color: var(--dark-navy);">Edu</span><span style="color: var(--rainbow-blue);">Hub</span>🌈
        </div>
    </a>

    <a href="profile.html" class="text-decoration-none">
        <div class="child-profile-box shadow-sm">
            <div class="avatar-img" id="sidebar-avatar">👦</div>
            <h6 class="fw-bold mb-0" style="color: var(--dark-navy);" id="sidebar-name">Little Adventurer</h6>
            <small class="text-muted fw-bold" id="sidebar-level">Explorer</small>
        </div>
    </a>

    <nav class="nav-links">
        <a href="child-dashboard.html" class="nav-link-custom nav-dashboard"><i class="bi bi-grid-1x2-fill"></i> <span>Dashboard</span></a>
        <a href="lessons.html" class="nav-link-custom nav-lessons"><i class="bi bi-book-half"></i> <span>Lessons</span></a>
        <a href="songs.html" class="nav-link-custom nav-songs"><i class="bi bi-music-note-beamed"></i> <span>Fun Songs</span></a>
        <a href="cartoons.html" class="nav-link-custom nav-cartoons"><i class="bi bi-play-circle-fill"></i> <span>Cartoons</span></a>
        <a href="quizzes.html" class="nav-link-custom nav-quizzes active"><i class="bi bi-trophy-fill"></i> <span>Quizzes</span></a>
    </nav>

    <div class="logout-container">
        <a href="index.html" class="btn-logout" id="logout-btn">
            <i class="bi bi-box-arrow-right me-2"></i> <span>Logout</span>
        </a>
    </div>
</div>

<div class="main-content">
    <div class="modal-content text-center animate__animated animate__fadeInUp">
        <div class="border-0 pb-0 d-flex justify-content-between align-items-center px-4 mt-3">
            <span class="badge bg-success text-white rounded-pill px-3 fw-bold" id="questionCounter">Question 1/10</span>
            <a href="quizzes.html" class="btn-close" aria-label="Close"></a>
        </div>

        <div class="modal-body p-4">
            <div class="progress mb-4">
                <div id="quizProgress" class="progress-bar bg-success" style="width: 10%;"></div>
            </div>

            <div id="quiz-ui">
                <div class="q-image-box" id="q-image">🌸</div>
                <h4 class="fw-bold mb-4" style="font-family: 'Fredoka'; color: #2D3436;">Can you name this flower?</h4>
                <div id="options-grid" class="row g-3">
                </div>
            </div>

            <div id="result-ui" class="d-none py-3">
                <h1 style="font-size: 5rem;" id="result-emoji">🌸🌟🌸</h1>
                <h2 class="fw-bold" style="font-family: 'Fredoka';" id="result-title">You are a Flower Expert!</h2>
                <p class="fs-4 fw-bold mb-4">You got <span id="finalScore" class="text-success">0</span>/10 correct!</p>
                <div class="d-flex flex-column gap-2 align-items-center">
                    <a href="quizzes.html" class="btn btn-lg btn-success rounded-pill px-5 fw-bold shadow text-white w-75">Back to Quizzes 🏆</a>
                    <a href="lessons.html" class="btn btn-lg btn-outline-success rounded-pill px-5 fw-bold w-75">Back to Lessons 📚</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    const flowerData = [
        { item: "Rose", emoji: "🌹", correct: "Rose", options: ["Lotus", "Rose", "Sunflower", "Tulip"] },
        { item: "Sunflower", emoji: "🌻", correct: "Sunflower", options: ["Daisy", "Lily", "Sunflower", "Rose"] },
        { item: "Lotus", emoji: "🪷", correct: "Lotus", options: ["Lotus", "Tulip", "Jasmine", "Orchid"] },
        { item: "Tulip", emoji: "🌷", correct: "Tulip", options: ["Rose", "Tulip", "Daisy", "Sunflower"] },
        { item: "Hibiscus", emoji: "🌺", correct: "Hibiscus", options: ["Lily", "Hibiscus", "Lotus", "Rose"] },
        { item: "Cherry Blossom", emoji: "🌸", correct: "Cherry Blossom", options: ["Tulip", "Rose", "Cherry Blossom", "Daisy"] },
        { item: "White Flower", emoji: "💮", correct: "White Flower", options: ["White Flower", "Lotus", "Tulip", "Lily"] },
        { item: "Bouquet", emoji: "💐", correct: "Bouquet", options: ["Rose", "Bouquet", "Daisy", "Lotus"] },
        { item: "Blossom", emoji: "🌼", correct: "Blossom", options: ["Sunflower", "Blossom", "Rose", "Tulip"] },
        { item: "Wilted Rose", emoji: "🥀", correct: "Wilted Rose", options: ["Wilted Rose", "Lotus", "Sunflower", "Daisy"] }
    ];

    let currentQ = 0;
    let score = 0;

    window.onload = () => {
        loadQuestion();
    };

    function loadQuestion() {
        const q = flowerData[currentQ];
        document.getElementById('questionCounter').innerText = `Question ${currentQ + 1}/10`;
        document.getElementById('quizProgress').style.width = `${(currentQ + 1) * 10}%`;

        document.getElementById('q-image').innerText = q.emoji;

        const optionsGrid = document.getElementById('options-grid');
        optionsGrid.innerHTML = "";

        q.options.forEach(opt => {
            const col = document.createElement('div');
            col.className = "col-6";
            col.innerHTML = `<div class="option-card animate__animated animate__fadeIn" onclick="checkAnswer('${opt}', '${q.correct}', this)">${opt}</div>`;
            optionsGrid.appendChild(col);
        });
    }

    function checkAnswer(selected, correct, element) {
        const allOptions = document.querySelectorAll('.option-card');
        allOptions.forEach(opt => opt.style.pointerEvents = "none");

        if (selected === correct) {
            element.style.background = "#2ecc71";
            element.style.color = "white";
            element.style.borderColor = "#27ae60";
            score++;
        } else {
            element.style.background = "#FF5E78";
            element.style.color = "white";
            element.style.borderColor = "#e84118";


            allOptions.forEach(opt => {
                const text = opt.innerText.trim();
                if(text === correct) {
                    opt.style.background = "#2ecc71";
                    opt.style.color = "white";
                    opt.style.borderColor = "#27ae60";
                }
            });
        }

        setTimeout(() => {
            currentQ++;
            if (currentQ < flowerData.length) {
                loadQuestion();
            } else {
                showFinalResults();
            }
        }, 1500);
    }

    function showFinalResults() {
        document.getElementById('quiz-ui').classList.add('d-none');
        document.getElementById('result-ui').classList.remove('d-none');
        document.getElementById('finalScore').innerText = score;


        const resultEmoji = document.getElementById('result-emoji');
        const resultTitle = document.getElementById('result-title');

        if(score >= 8) {
            resultEmoji.innerText = "🌸🌟🌸";
            resultTitle.innerText = "You are a Flower Expert!";
        } else if(score >= 5) {
            resultEmoji.innerText = "🌼👍🌼";
            resultTitle.innerText = "Good Job! Well Done!";
        } else {
            resultEmoji.innerText = "🥀💪🥀";
            resultTitle.innerText = "Nice Try! Keep Practicing!";
        }

        const childId = sessionStorage.getItem("childId");
        const token = localStorage.getItem("jwtToken");

        const progressData = {
            childId: parseInt(childId),
            lessonName: "Flower Garden Lesson",
            category: "Nature",
            starsEarned: score,
            isCompleted: true
        };

        fetch('http://localhost:8080/api/progress/save', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(progressData)
        })
            .then(response => {
                if (response.ok) {
                    console.log('Progress saved successfully in backend! 🚀');
                    Swal.fire({
                        title: 'Data Saved! 💾',
                        text: 'Your progress has been recorded successfully.',
                        icon: 'success',
                        timer: 2000,
                        showConfirmButton: false
                    });
                } else {
                    throw new Error('Failed to save score');
                }
            })
            .catch((error) => {
                console.error('Error saving progress:', error);
                Swal.fire({
                    title: 'Oops! ❌',
                    text: 'Failed to save score. Please try again.',
                    icon: 'error'
                });
            });
    }


    document.addEventListener("DOMContentLoaded", function() {
        const name = sessionStorage.getItem("childName");
        const gender = sessionStorage.getItem("childGender");
        const level = sessionStorage.getItem("childLevel");

        const nameElement = document.getElementById("sidebar-name");
        if (name && nameElement) nameElement.innerText = name;

        const avatarElement = document.getElementById("sidebar-avatar");
        if (gender && avatarElement) {
            const upperGender = gender.toUpperCase();
            if (upperGender === "FEMALE" || upperGender === "GIRL") {
                avatarElement.innerText = "👧";
                avatarElement.style.borderColor = "var(--rainbow-red)";
            } else {
                avatarElement.innerText = "👦";
                avatarElement.style.borderColor = "var(--rainbow-blue)";
            }
        }

        const levelElement = document.getElementById("sidebar-level");
        if (level && levelElement) levelElement.innerText = level;

        const logoutBtn = document.getElementById("logout-btn");
        if(logoutBtn) {
            logoutBtn.addEventListener("click", function() {
                sessionStorage.clear();
            });
        }
    });
</script>
</body>
</html>
