<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzes | MiniToons EduHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --rainbow-red: #FF5E78; --rainbow-orange: #FF9F43; --rainbow-yellow: #FFD93D;
            --rainbow-green: #2ecc71; --rainbow-blue: #4D96FF; --rainbow-purple: #927DFF;
            --dark-navy: #2D3436; --glass: rgba(255, 255, 255, 0.95);
        }
        body { font-family: 'Quicksand', sans-serif; background: #FFD93D; min-height: 100vh; margin: 0; overflow-x: hidden; }

        /* --- Sidebar --- */
        .sidebar {
            background: var(--glass); backdrop-filter: blur(15px); height: 100vh;
            border-right: 1px solid rgba(0,0,0,0.08); padding: 25px 15px;
            position: fixed; width: 260px; z-index: 1000; display: flex; flex-direction: column;
        }
        .sidebar-brand { font-family: 'Fredoka', cursive; text-align: center; margin-bottom: 25px; text-decoration: none; display: block; }
        .brand-text { display: flex; justify-content: center; line-height: 1; font-size: 2.2rem; font-weight: bolder; }

        .child-profile-box { text-align: center; background: white; border-radius: 25px; padding: 15px; margin-bottom: 20px; border: 2px solid rgba(0,0,0,0.03); transition: 0.3s; cursor: pointer; position: relative; /* 👈 Mobile oval effect එකට */ }
        .avatar-img { width: 65px; height: 65px; background: #f0f4f8; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; margin: 0 auto 10px; border: 3px solid var(--rainbow-blue); position: relative; z-index: 2; /* 👈 Mobile view එකට */ }

        .nav-link-custom { transition: all 0.3s; border-left: 5px solid transparent; margin-bottom: 5px; font-weight: 700; padding: 10px 18px; border-radius: 12px; display: flex; align-items: center; text-decoration: none; color: #636e72; font-size: 0.95rem; }
        .nav-link-custom i { font-size: 1.1rem; margin-right: 12px; }

        .nav-quizzes.active {
            color: var(--rainbow-red) !important;
            background: rgba(255, 94, 120, 0.08);
            border-left-color: var(--rainbow-red);
        }

        .nav-link-custom:hover {
            color: var(--rainbow-purple) !important;
            background: rgba(146, 125, 255, 0.08);
            border-left-color: var(--rainbow-purple);
            transform: translateX(5px);
        }

        .logout-container {
            margin-top: auto;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 15px;
        }

        .btn-logout {
            color: var(--rainbow-red) !important;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            padding: 12px 18px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .btn-logout:hover {
            background: rgba(255, 94, 120, 0.08);
            transform: translateX(5px);
        }

        /* --- Main Content --- */
        .main-content { margin-left: 260px; padding: 35px; }
        .header-box { background: white; border-radius: 30px; padding: 25px; display: flex; align-items: center; margin-bottom: 30px; }

        .quiz-card { background: white; border-radius: 35px; border: none; transition: 0.3s ease; overflow: hidden; text-align: center; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
        .quiz-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .quiz-icon-box { height: 140px; display: flex; align-items: center; justify-content: center; font-size: 4rem; position: relative; }
        .badge-stars { position: absolute; top: 15px; right: 20px; background: var(--rainbow-yellow); color: var(--dark-navy); padding: 5px 12px; border-radius: 20px; font-weight: 800; font-size: 0.8rem; }
        .btn-play-quiz { background: var(--rainbow-purple); color: white; border: none; padding: 12px; border-radius: 20px; font-weight: 800; width: 100%; transition: 0.3s; margin-top: auto; }
        .btn-play-quiz:hover { background: var(--dark-navy); transform: scale(1.05); }

        /* --- ⚠️ මෙන්න මේ RESPONSIVE කොටස විතරයි මම වෙනස් කළේ --- */
        @media (max-width: 992px) {
            /* Sidebar එක කෙට්ටු කිරීම */
            .sidebar {
                width: 90px;
                padding: 20px 10px;
                align-items: center;
                background: #FFFDF5; /* Soft background color එක */
            }
            .sidebar span, .sidebar-brand, .child-profile-box h6, .child-profile-box small {
                display: none !important;
            }
            .main-content { margin-left: 90px; padding: 20px; }

            /* Avatar එක Image එකේ වගේ overflow oval shape එකක් කිරීම */
            .child-profile-box {
                background: transparent;
                border: none;
                padding: 0;
                margin-bottom: 25px;
                width: 65px;
                display: flex;
                justify-content: center;
            }
            .child-profile-box::before {
                content: '';
                position: absolute;
                top: 50%; left: 50%;
                transform: translate(-50%, -50%);
                width: 45px; height: 85px;
                background: white;
                border-radius: 25px;
                z-index: 1;
            }
            .avatar-img {
                width: 60px; height: 60px;
                font-size: 1.8rem;
                margin: 0;
                background: white;
                border: 4px solid var(--rainbow-blue);
                box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            }

            /* Nav Links Icons Only කිරීම */
            .nav-links {
                display: flex;
                flex-direction: column;
                gap: 15px;
                align-items: center;
                width: 100%;
            }
            .nav-link-custom {
                width: 50px; height: 50px;
                justify-content: center;
                padding: 0;
                border-radius: 18px;
                border-left: none;
            }
            .nav-link-custom:hover { transform: none; }
            .nav-link-custom i { font-size: 1.5rem; margin-right: 0; }

            /* Active icon එකට soft background එකක් දීම */
            .nav-quizzes.active {
                color: var(--rainbow-red) !important;
                background: #FFF0F2;
            }

            /* Logout Button එකත් රවුම් කිරීම */
            .logout-container { border-top: none; }
            .btn-logout {
                width: 50px; height: 50px;
                justify-content: center;
                padding: 0;
                border-radius: 18px;
                display: flex;
                align-items: center;
            }
            .btn-logout:hover { transform: none; }
            .btn-logout i { font-size: 1.5rem; margin-right: 0; }
        }
    </style>
</head>
<body>

<div class="sidebar shadow-sm">
    <a href="#" class="sidebar-brand">
        <div class="brand-text">
            <span style="color: var(--rainbow-red);">M</span><span style="color: var(--rainbow-orange);">i</span><span style="color: var(--rainbow-yellow);">n</span><span style="color: var(--rainbow-green);">i</span><span style="color: var(--rainbow-blue);">T</span><span style="color: var(--rainbow-purple);">oons</span>
        </div>
        <div class="brand-text" style="font-size:1.8rem; margin-top:-5px;">
            <span style="color: var(--dark-navy);">Edu</span><span style="color: var(--rainbow-blue);">Hub</span>🌈
        </div>
    </a>

    <a href="profile.html" class="text-decoration-none">
        <div class="child-profile-box shadow-sm">
            <div class="avatar-img" id="sidebar-avatar">👦</div>
            <h6 class="fw-bold mb-0" style="color: var(--dark-navy);" id="sidebar-name">Little Adventurer</h6>
            <small class="text-muted fw-bold" id="sidebar-level">Explorer</small>
        </div>
    </a>

    <nav class="nav-links">
        <a href="child-dashboard.html" class="nav-link-custom nav-dashboard" title="Dashboard"><i class="bi bi-grid-1x2-fill"></i> <span>Dashboard</span></a>
        <a href="lessons.html" class="nav-link-custom nav-lessons" title="Lessons"><i class="bi bi-book-half"></i> <span>Lessons</span></a>
        <a href="songs.html" class="nav-link-custom nav-songs" title="Fun Songs"><i class="bi bi-music-note-beamed"></i> <span>Fun Songs</span></a>
        <a href="cartoons.html" class="nav-link-custom nav-cartoons" title="Cartoons"><i class="bi bi-play-circle-fill"></i> <span>Cartoons</span></a>
        <a href="quizzes.html" class="nav-link-custom nav-quizzes active" title="Quizzes"><i class="bi bi-trophy-fill"></i> <span>Quizzes</span></a>
    </nav>

    <div class="logout-container">
        <a href="index.html" class="btn-logout" id="logout-btn" title="Logout">
            <i class="bi bi-box-arrow-right"></i> <span>Logout</span>
        </a>
    </div>
</div>

<div class="main-content">
    <div class="header-box shadow-sm">
        <div class="me-4" style="font-size: 3.5rem;">🏆</div>
        <div>
            <h1 class="fw-bold mb-1" id="welcome-text" style="color: var(--dark-navy); font-family: 'Fredoka';">Quiz Time!</h1>
            <p class="text-muted fw-bold mb-0">Show your skills and earn stars! ⭐</p>
        </div>
    </div>

    <div class="row g-4" id="quizContainer">
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function getQuizEmoji(category) {
        const c = category ? category.toLowerCase() : "";
        if(c.includes("math") || c.includes("number")) return "🔢";
        if(c.includes("language") || c.includes("alphabet")) return "🔤";
        if(c.includes("nature")) return "🌿";
        if(c.includes("logic") || c.includes("puzzle")) return "🧩";
        return "🧠";
    }

    async function loadQuizzes() {
        const container = document.getElementById('quizContainer');
        container.innerHTML = "<p class='fw-bold text-center'>Loading quizzes...</p>";

        try {
            const res = await fetch(`http://localhost:8080/api/v1/quizzes`);
            if (!res.ok) throw new Error("Failed to fetch quizzes");
            const quizzes = await res.json();

            container.innerHTML = "";
            if (quizzes.length === 0) {
                container.innerHTML = "<div class='col-12 text-center'><p class='fw-bold'>No quizzes assigned yet. Come back soon! 😊</p></div>";
                return;
            }

            quizzes.forEach(q => {
                const col = document.createElement('div');
                col.className = "col-md-6 col-lg-4";

                const quizUrl = q.url ? q.url : `lesson${q.id}_quiz.html`;

                col.innerHTML = `
                    <div class="quiz-card shadow-sm">
                        <div class="quiz-icon-box" style="background: #f8fbff;">
                            ${getQuizEmoji(q.category)}
                            <span class="badge-stars">⭐ New</span>
                        </div>
                        <div class="p-4 d-flex flex-grow-1 flex-column justify-content-between">
                            <div>
                                <h5 class="fw-bold mb-1" style="font-family: 'Fredoka';">${q.title}</h5>
                                <p class="small text-muted fw-bold mb-3">${q.category} • ${q.difficulty}</p>
                            </div>
                            <button class="btn-play-quiz">Play Now 🚀</button>
                        </div>
                    </div>
                `;

                col.querySelector(".btn-play-quiz").addEventListener("click", () => {
                    window.location.href = quizUrl;
                });

                container.appendChild(col);
            });

        } catch(err) {
            console.error(err);
            container.innerHTML = `
                <div class="col-12 text-center mb-3"><p class="text-danger fw-bold">Connecting to API failed. Loading demo quizzes...</p></div>
                <div class="col-md-6 col-lg-4">
                    <div class="quiz-card shadow-sm">
                        <div class="quiz-icon-box" style="background: #f8fbff;">🔢 <span class="badge-stars">⭐ 3 Stars</span></div>
                        <div class="p-4 d-flex flex-grow-1 flex-column justify-content-between">
                            <div><h5 class="fw-bold mb-1">Numbers & Counting</h5><p class="small text-muted fw-bold mb-3">Math • Easy</p></div>
                            <button class="btn-play-quiz" onclick="window.location.href='lesson1_quiz.html'">Play Now 🚀</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 col-lg-4">
                    <div class="quiz-card shadow-sm">
                        <div class="quiz-icon-box" style="background: #f8fbff;">🔤 <span class="badge-stars">⭐ 0 Stars</span></div>
                        <div class="p-4 d-flex flex-grow-1 flex-column justify-content-between">
                            <div><h5 class="fw-bold mb-1">ABC Alphabet Challenge</h5><p class="small text-muted fw-bold mb-3">Language • Medium</p></div>
                            <button class="btn-play-quiz" onclick="window.location.href='lesson2_quiz.html'">Play Now 🚀</button>
                        </div>
                    </div>
                </div>
            `;
        }
    }

    function saveQuizProgress(lessonName, category, starsEarned) {
        const token = localStorage.getItem("jwtToken");
        const childId = sessionStorage.getItem("childId") || 1;

        if (!token) {
            console.error("No JWT Token found. Please sign in again.");
            return;
        }

        const quizResult = {
            childId: parseInt(childId),
            lessonName: lessonName,
            category: category,
            starsEarned: starsEarned
        };

        fetch("http://localhost:8080/api/progress/save", {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${token}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify(quizResult)
        })
            .then(res => res.text())
            .then(data => {
                console.log("Progress Saved Successfully! 🎉", data);
            })
            .catch(err => console.error("Error saving progress:", err));
    }

    document.addEventListener("DOMContentLoaded", function() {
        loadQuizzes();

        const name = sessionStorage.getItem("childName");
        const gender = sessionStorage.getItem("childGender");
        const level = sessionStorage.getItem("childLevel");

        const nameElement = document.getElementById("sidebar-name");
        const welcomeElement = document.getElementById("welcome-text");

        if (name) {
            if(nameElement) nameElement.innerText = name;
            if(welcomeElement) welcomeElement.innerText = `Quiz Time, ${name}! 🏆`;
        }

        const avatarElement = document.getElementById("sidebar-avatar");
        if (gender && avatarElement) {
            const upperGender = gender.toUpperCase();
            if (upperGender === "FEMALE" || upperGender === "GIRL") {
                avatarElement.innerText = "👧";
                avatarElement.style.borderColor = "var(--rainbow-red)";
            } else {
                avatarElement.innerText = "👦";
                avatarElement.style.borderColor = "var(--rainbow-blue)";
            }
        }

        const levelElement = document.getElementById("sidebar-level");
        if (level && levelElement) {
            levelElement.innerText = level;
        }

        const logoutBtn = document.getElementById("logout-btn");
        if(logoutBtn) {
            logoutBtn.addEventListener("click", function() {
                sessionStorage.clear();
            });
        }
    });
</script>
</body>
</html>
