<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magic Letters | MiniToons EduHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

  <style>
    :root {
      --ps-pink: #FFDDE8;     --ps-orange: #FFE5C9;    --ps-yellow: #FFF9D1;
      --ps-green: #E2FDE8;    --ps-blue: #D0E9FF;      --ps-purple: #E6E0F8;
      --ps-txt-pink: #E91E63; --ps-txt-purple: #673AB7; --ps-txt-blue: #03A9F4;
      --ps-txt-green: #2E7D32; --ps-txt-orange: #EF6C00;

      --rainbow-red: #FF5E78;
      --rainbow-orange: #FF9F43;
      --rainbow-yellow: #FFD93D;
      --rainbow-green: #2ecc71;
      --rainbow-blue: #4D96FF;
      --rainbow-purple: #927DFF;
      --dark-navy: #2D3436;
      --glass: rgba(255, 255, 255, 0.95);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Quicksand', sans-serif;
      background: radial-gradient(circle, #8489ec 0%, #f39bbb 100%);
      min-height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* 🚪 Sidebar Styles */
    .sidebar {
      background: var(--glass);
      backdrop-filter: blur(15px);
      height: 100vh;
      border-right: 1px solid rgba(0,0,0,0.08);
      padding: 25px 15px;
      position: fixed;
      width: 260px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-brand { font-family: 'Fredoka', cursive; text-align: center; margin-bottom: 25px; text-decoration: none; display: block; }
    .brand-text { display: flex; justify-content: center; line-height: 1; font-size: 2.2rem; font-weight: bolder; }

    .child-profile-box { text-align: center; background: white; border-radius: 25px; padding: 15px; margin-bottom: 20px; border: 2px solid rgba(0,0,0,0.03); cursor:pointer; }
    .avatar-img { width: 65px; height: 65px; background: #f0f4f8; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; margin: 0 auto 10px; border: 3px solid var(--rainbow-blue); }

    .nav-link-custom { transition: all 0.3s; border-left: 5px solid transparent; margin-bottom: 5px; font-weight: 700; padding: 10px 18px; border-radius: 12px; display: flex; align-items: center; text-decoration: none; color: #636e72; font-size: 0.95rem; }
    .nav-link-custom i { font-size: 1.1rem; margin-right: 12px; }

    .nav-lessons.active {
      color: var(--rainbow-green) !important;
      background: rgba(46, 204, 113, 0.08);
      border-left-color: var(--rainbow-green);
    }

    .nav-link-custom:hover {
      color: var(--rainbow-purple) !important;
      background: rgba(146, 125, 255, 0.08);
      border-left-color: var(--rainbow-purple);
      transform: translateX(5px);
    }

    .logout-container {
      margin-top: auto;
      border-top: 1px solid rgba(0,0,0,0.05);
      padding-top: 15px;
    }

    .btn-logout {
      color: var(--rainbow-red) !important;
      font-weight: 700;
      text-decoration: none;
      display: flex;
      align-items: center;
      padding: 12px 18px;
      border-radius: 12px;
      transition: 0.3s;
    }

    .btn-logout:hover {
      background: rgba(255, 94, 120, 0.08);
      transform: translateX(5px);
    }

    /* 📝 Main Content Area */
    .main-content {
      margin-left: 260px;
      padding: 35px;
      flex: 1;
      height: 100vh;
      overflow-y: auto;
      text-align: center;
      position: relative;
    }

    .main-content::before {
      content: "☁️"; position: absolute; top: 15%; left: 8%; font-size: 3rem; opacity: 0.2; animation: float 7s infinite ease-in-out;
    }
    .main-content::after {
      content: "✨"; position: absolute; bottom: 15%; right: 8%; font-size: 2.5rem; opacity: 0.2; animation: float 5s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    .main-title {
      font-family: 'Fredoka', sans-serif;
      font-size: 4rem;
      font-weight: 700;
      background: linear-gradient(to right, #FF80AB, #BA68C8, #64B5F6, #81C784);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 5px;
      text-shadow: 2px 2px 0px white;
    }

    .alphabet-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    /* Updated Card Styling - Letter Only */
    .letter-card {
      height: 110px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fredoka', sans-serif;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 10px 0 rgba(0,0,0,0.05);
      border: 5px solid white;
      position: relative;
    }

    .letter-card:hover {
      transform: translateY(-8px) rotate(5deg);
      box-shadow: 0 15px 30px rgba(0,0,0,0.1);
    }

    .letter-card span.big-l {
      font-size: 3.5rem;
      font-weight: 700;
      text-shadow: 2px 2px 0 white;
    }

    .new-badge {
      position: absolute; top: -5px; right: -5px;
      background: var(--rainbow-red); color: white; font-size: 0.75rem;
      padding: 3px 10px; border-radius: 12px; font-weight: 700;
    }

    /* Pastel Letter Colors */
    .card-pink { background: var(--ps-pink); color: var(--ps-txt-pink); }
    .card-purple { background: var(--ps-purple); color: var(--ps-txt-purple); }
    .card-blue { background: var(--ps-blue); color: var(--ps-txt-blue); }
    .card-green { background: var(--ps-green); color: var(--ps-txt-green); }
    .card-orange { background: var(--ps-orange); color: var(--ps-txt-orange); }
    .card-yellow { background: var(--ps-yellow); color: var(--ps-txt-orange); }

    .back-btn, .btn-quiz-unlock {
      padding: 15px 40px;
      border-radius: 50px;
      background: white;
      color: #FF80AB;
      text-decoration: none;
      font-weight: 700;
      display: inline-block;
      transition: 0.3s;
      border: 3px solid #FFDDE8;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .back-btn:hover {
      background: #FFDDE8;
      color: #E91E63;
      transform: scale(1.05);
    }

    .btn-quiz-unlock {
      border-color: #A5D6A7;
      color: #2E7D32;
    }

    .btn-quiz-unlock:hover {
      background: #E8F5E9;
      color: #1B5E20;
      transform: scale(1.05);
    }

    /* Modal Styles */
    .modal-content {
      border: none;
      border-radius: 50px;
      background: rgba(255, 255, 255, 0.99);
      box-shadow: 0 30px 80px rgba(0,0,0,0.1);
    }

    .modal-body {
      padding: 50px 30px;
      position: relative;
    }

    .modal-title-custom {
      font-family: 'Fredoka';
      font-size: 5rem;
      text-align: center;
    }

    .object-icon {
      font-size: 7rem;
      margin: 10px 0;
      display: block;
    }

    .word-text {
      font-size: 3rem;
      font-weight: 700;
      color: #444;
      text-transform: uppercase;
    }

    @media (max-width: 992px) { .sidebar { width: 80px; } .sidebar span, .brand-text { display: none; } .main-content { margin-left: 80px; } }
  </style>
</head>
<body>

<div class="sidebar shadow-sm">
  <a href="#" class="sidebar-brand">
    <div class="brand-text">
      <span style="color: var(--rainbow-red);">M</span><span style="color: var(--rainbow-orange);">i</span><span style="color: var(--rainbow-yellow);">n</span><span style="color: var(--rainbow-green);">i</span><span style="color: var(--rainbow-blue);">T</span><span style="color: var(--rainbow-purple);">oons</span>
    </div>
    <div class="brand-text" style="font-size:1.8rem; margin-top:-5px;">
      <span style="color: var(--dark-navy);">Edu</span><span style="color: var(--rainbow-blue);">Hub</span>🌈
    </div>
  </a>

  <a href="profile.html" class="text-decoration-none">
    <div class="child-profile-box shadow-sm" style="cursor: pointer; transition: 0.3s;">
      <div class="avatar-img" id="sidebar-avatar">👦</div>
      <h6 class="fw-bold mb-0" style="color: var(--dark-navy);" id="sidebar-name">Little Adventurer</h6>
      <small class="text-muted fw-bold" id="sidebar-level">Explorer</small>
    </div>
  </a>

  <nav class="nav-links">
    <a href="child-dashboard.html" class="nav-link-custom nav-dashboard"><i class="bi bi-grid-1x2-fill"></i> <span>Dashboard</span></a>
    <a href="lessons.html" class="nav-link-custom nav-lessons active"><i class="bi bi-book-half"></i> <span>Lessons</span></a>
    <a href="songs.html" class="nav-link-custom nav-songs"><i class="bi bi-music-note-beamed"></i> <span>Fun Songs</span></a>
    <a href="cartoons.html" class="nav-link-custom nav-cartoons"><i class="bi bi-play-circle-fill"></i> <span>Cartoons</span></a>
    <a href="quizzes.html" class="nav-link-custom nav-quizzes"><i class="bi bi-trophy-fill"></i> <span>Quizzes</span></a>
  </nav>

  <div class="logout-container">
    <a href="index.html" class="btn-logout" id="logout-btn">
      <i class="bi bi-box-arrow-right me-2"></i> <span>Logout</span>
    </a>
  </div>
</div>

<div class="main-content">
  <div>
    <h1 class="main-title animate__animated animate__pulse animate__infinite">Magic Letters ✨</h1>
    <p class="lead fw-bold text-muted">Tap a letter to see a magic friend!</p>

    <div class="alert alert-info d-inline-block rounded-pill fw-bold py-1 px-4 mb-0" style="font-size: 0.9rem;" id="progressInfo">
      Tap all 26 letters to unlock the Quiz! 🔓 (0/26)
    </div>
  </div>

  <div class="alphabet-grid" id="letterGrid">
  </div>

  <div class="mt-4 mb-3 d-flex justify-content-center gap-3" id="actionButtons">
    <a href="lessons.html" class="back-btn animate__animated animate__fadeInUp">
      <i class="fas fa-chevron-left me-2"></i> Back to Lessons
    </a>
  </div>
</div>

<div class="modal fade" id="letterModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content animate__animated animate__jackInTheBox">
      <div class="modal-body text-center">
        <button type="button" class="btn-close float-end" data-bs-dismiss="modal" aria-label="Close"></button>
        <h2 class="modal-title-custom" id="mLetter">Aa</h2>
        <div id="mIcon" class="object-icon animate__animated animate__bounce animate__infinite">🍎</div>
        <h3 id="mWord" class="word-text">APPLE</h3>
        <p id="mHelper" class="fw-bold text-muted mt-3">"A is for Apple!"</p>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  const alphabet = {
    'A': { word: "Apple", icon: "🍎", themeClass: "card-pink" },
    'B': { word: "Ball", icon: "⚽", themeClass: "card-blue" },
    'C': { word: "Cat", icon: "🐱", themeClass: "card-orange" },
    'D': { word: "Dog", icon: "🐶", themeClass: "card-green" },
    'E': { word: "Egg", icon: "🥚", themeClass: "card-purple" },
    'F': { word: "Fish", icon: "🐟", themeClass: "card-blue" },
    'G': { word: "Grapes", icon: "🍇", themeClass: "card-green" },
    'H': { word: "Hat", icon: "👒", themeClass: "card-pink" },
    'I': { word: "Ice Cream", icon: "🍦", themeClass: "card-blue" },
    'J': { word: "Jellyfish", icon: "🪼", themeClass: "card-purple" },
    'K': { word: "Kite", icon: "🪁", themeClass: "card-orange" },
    'L': { word: "Lion", icon: "🦁", themeClass: "card-yellow" },
    'M': { word: "Monkey", icon: "🐒", themeClass: "card-pink" },
    'N': { word: "Nest", icon: "🪺", themeClass: "card-blue" },
    'O': { word: "Orange", icon: "🍊", themeClass: "card-orange" },
    'P': { word: "Panda", icon: "🐼", themeClass: "card-green" },
    'Q': { word: "Queen", icon: "👸", themeClass: "card-purple" },
    'R': { word: "Rabbit", icon: "🐰", themeClass: "card-pink" },
    'S': { word: "Sun", icon: "☀️", themeClass: "card-yellow" },
    'T': { word: "Tiger", icon: "🐯", themeClass: "card-orange" },
    'U': { word: "Umbrella", icon: "☂️", themeClass: "card-purple" },
    'V': { word: "Van", icon: "🚐", themeClass: "card-blue" },
    'W': { word: "Whale", icon: "🐳", themeClass: "card-blue" },
    'X': { word: "Xylophone", icon: "🪘", themeClass: "card-orange" },
    'Y': { word: "Yo-Yo", icon: "🪀", themeClass: "card-pink" },
    'Z': { word: "Zebra", icon: "🦓", themeClass: "card-green" }
  };

  const grid = document.getElementById('letterGrid');
  const modal = new bootstrap.Modal(document.getElementById('letterModal'));

  let viewedLetters = new Set();
  let quizButtonAdded = false;

  Object.keys(alphabet).forEach((letter, index) => {
    const data = alphabet[letter];
    const card = document.createElement('div');
    card.className = `letter-card ${data.themeClass} animate__animated animate__fadeInUp`;
    card.style.animationDelay = `${index * 0.05}s`;
    card.id = `letter-${index}`;

    card.innerHTML = `
      <span class="new-badge" id="badge-${index}">New</span>
      <span class="big-l">${letter}</span>
    `;

    card.onclick = () => {
      document.getElementById('mLetter').innerText = `${letter}${letter.toLowerCase()}`;
      document.getElementById('mIcon').innerText = data.icon;
      document.getElementById('mWord').innerText = data.word;
      document.getElementById('mHelper').innerText = `"${letter} is for ${data.word}!"`;

      const txtColor = getComputedStyle(card).color;
      document.getElementById('mLetter').style.color = txtColor;
      modal.show();

      viewedLetters.add(index);

      const badge = document.getElementById(`badge-${index}`);
      if (badge) badge.remove();

      document.getElementById('progressInfo').innerText = `Tap all 26 letters to unlock the Quiz! 🔓 (${viewedLetters.size}/26)`;


      if (viewedLetters.size === Object.keys(alphabet).length && !quizButtonAdded) {
        const actionButtons = document.getElementById('actionButtons');
        const quizBtn = document.createElement('a');
        quizBtn.href = "alphabet-quiz.html";
        quizBtn.className = "btn btn-quiz-unlock animate__animated animate__rubberBand";
        quizBtn.innerHTML = `<i class="bi bi-trophy-fill me-2"></i> Play Alphabet Quiz`;
        actionButtons.appendChild(quizBtn);
        quizButtonAdded = true;
      }
    };

    grid.appendChild(card);
  });


  document.getElementById('letterModal').addEventListener('hidden.bs.modal', function () {
    if (viewedLetters.size === Object.keys(alphabet).length) {
      Swal.fire({
        title: 'Awesome! 🌟',
        text: 'You checked all the letters! Now let\'s play the quiz!',
        icon: 'success',
        timer: 2000,
        showConfirmButton: false
      }).then(() => {
        window.location.href = "alphabet-quiz.html";
      });
    }
  });


  document.addEventListener("DOMContentLoaded", function() {
    const name = sessionStorage.getItem("childName");
    const gender = sessionStorage.getItem("childGender");
    const level = sessionStorage.getItem("childLevel");

    const nameElement = document.getElementById("sidebar-name");
    if (name && nameElement) nameElement.innerText = name;

    const avatarElement = document.getElementById("sidebar-avatar");
    if (gender && avatarElement) {
      const upperGender = gender.toUpperCase();
      if (upperGender === "FEMALE" || upperGender === "GIRL") {
        avatarElement.innerText = "👧";
        avatarElement.style.borderColor = "var(--rainbow-red)";
      } else {
        avatarElement.innerText = "👦";
        avatarElement.style.borderColor = "var(--rainbow-blue)";
      }
    }

    const levelElement = document.getElementById("sidebar-level");
    if (level && levelElement) levelElement.innerText = level;

    const logoutBtn = document.getElementById("logout-btn");
    if(logoutBtn) {
      logoutBtn.addEventListener("click", function() {
        sessionStorage.clear();
      });
    }
  });
</script>

</body>
</html>
