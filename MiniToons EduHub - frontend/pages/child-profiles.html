        .nav-link-custom {
            transition: 0.3s; border-left: 5px solid transparent; margin-bottom: 5px;
            font-weight: 700; padding: 10px 18px; border-radius: 12px;
            display: flex; align-items: center; text-decoration: none; color: #636e72; font-size: 0.95rem;
        }
        .nav-profiles.active { color: var(--rainbow-orange) !important; background: rgba(255, 159, 67, 0.08); border-left-color: var(--rainbow-orange); }



        .nav-dashboard:hover, .nav-dashboard.active {
            color: var(--rainbow-red) !important;
            background: rgba(255, 94, 120, 0.08);
            border-left-color: var(--rainbow-red);
        }

        .nav-profiles:hover, .nav-profiles.active {
            color: var(--rainbow-orange) !important;
            background: rgba(255, 159, 67, 0.08);
            border-left-color: var(--rainbow-orange);

        .nav-learning:hover, .nav-learning.active {
            color: var(--rainbow-purple) !important;
            background: rgba(146, 125, 255, 0.08);
            border-left-color: var(--rainbow-purple);
        }

        .main-content { margin-left: 260px; padding: 35px; }

        .profile-container {
            background: white; border-radius: 30px; padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }

        .table-custom thead { background: #f8fafc; }
        .table-custom th { border: none; padding: 20px; font-weight: 800; color: var(--dark-navy); }
        .table-custom td { padding: 18px 20px; vertical-align: middle; border-top: 1px solid #f1f3f5; font-weight: 600; }

        .gender-option {
            border: 3px solid #f1f3f5; border-radius: 20px; padding: 15px;
            cursor: pointer; transition: 0.3s; text-align: center; background: #f8fafc;
        }
        .gender-option:hover { transform: translateY(-5px); border-color: var(--rainbow-blue); }
        .gender-radio:checked + .gender-option {
            border-color: var(--rainbow-blue); background: rgba(77, 150, 255, 0.1);
        }
        .gender-radio { display: none; }
        .gender-icon { font-size: 2.5rem; display: block; }

        .form-control-custom {
            border-radius: 15px; background: #f1f3f5; border: 2px solid transparent;
            padding: 12px 20px; font-weight: 600; transition: 0.3s;
        }
        .form-control-custom:focus { background: white; border-color: var(--rainbow-blue); box-shadow: none; }

        .btn-round { border-radius: 15px; padding: 12px 25px; font-weight: 700; }

        @media (max-width: 992px) {
            .sidebar { width: 80px; }
            .sidebar span, .brand-text { display: none; }
            .main-content { margin-left: 80px; }
        }
    </style>
</head>

<div class="modal fade" id="addChildModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 30px;">
            <div class="modal-header border-0 pt-4 px-4">
                <h4 class="fw-bold mb-0">Add New Explorer 🚀</h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="addChildForm">
                    <label class="fw-bold mb-3 d-block">Select Explorer Type:</label>
                    <div class="row mb-4">
                        <div class="col-6 text-center">
                            <input type="radio" name="gender" id="boy" class="gender-radio" value="boy" required>
                            <label for="boy" class="gender-option d-block w-100">
                                <span class="gender-icon">👦</span>
                                <span class="fw-bold">Little Boy</span>
                            </label>
                        </div>
                        <div class="col-6 text-center">
                            <input type="radio" name="gender" id="girl" class="gender-radio" value="girl">
                            <label for="girl" class="gender-option d-block w-100">
                                <span class="gender-icon">👧</span>
                                <span class="fw-bold">Little Girl</span>
                            </label>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="fw-bold mb-2">Child's Name</label>
                        <input type="text" id="childName" class="form-control form-control-custom" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="fw-bold mb-2">Login Username</label>
                            <input type="text" id="username" class="form-control form-control-custom" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="fw-bold mb-2">Age</label>
                            <input type="number" id="age" class="form-control form-control-custom" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="fw-bold mb-2">Login Password</label>
                        <input type="password" id="password" class="form-control form-control-custom" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-round py-3 border-0" style="background: var(--rainbow-green);">Create & Save ✨</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


<script>
    const addChildModalEl = document.getElementById('addChildModal');
    const addChildForm = document.getElementById("addChildForm");
    const submitBtn = addChildForm.querySelector("button[type='submit']");

    let isEditMode = false;
    let editingChildId = null;


    addChildModalEl.addEventListener('show.bs.modal', () => {
        if (!isEditMode) {
            addChildForm.reset();
            submitBtn.textContent = "Create & Save ✨";
            editingChildId = null;
        }
    });

    addChildModalEl.addEventListener('hidden.bs.modal', () => {
        isEditMode = false;
        editingChildId = null;
        submitBtn.textContent = "Create & Save ✨";
        addChildForm.reset();
    });


    async function loadChildProfiles() {
        try {
            const token = localStorage.getItem("jwtToken");

            if (!token) {
                alert("Login required 🔐");
                window.location.href = "index.html";
                return;
            }

            const res = await fetch("http://localhost:8080/api/v1/parent/children", {
                method: "GET",
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            if (res.status === 401) {
                alert("Session expired ❌");
                localStorage.removeItem("jwtToken");
                window.location.href = "index.html";
                return;
            }

            const children = await res.json();

            const tableBody = document.querySelector(".table-custom tbody");
            tableBody.innerHTML = "";

            if (children.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="text-center">No children found 😢</td></tr>`;
                return;
            }

            children.forEach(child => {
                const genderIcon = child.gender === "boy" ? "👦" : "👧";

                const row = document.createElement("tr");
                row.innerHTML = `
                <td><span class="fs-3 me-2">${genderIcon}</span> <strong>${child.name}</strong></td>
                <td>${child.username}</td>
                <td>${child.age} Years</td>
                <td>••••••••</td>
                <td>
                    <button class="btn btn-light btn-sm text-primary me-2" onclick="editChild(${child.id})">
                        <i class="bi bi-pencil-square"></i> Edit
                    </button>
                    <button class="btn btn-light btn-sm text-danger" onclick="deleteChild(${child.id})">
                        <i class="bi bi-trash3"></i> Delete
                    </button>
                </td>
            `;
                tableBody.appendChild(row);
            });

        } catch (err) {
            console.error(err);
            alert("Server error 🚨");
        }
    }


    async function addChildFormSubmitHandler(e) {
        e.preventDefault();

        let name = document.getElementById("childName").value.trim();
        const username = document.getElementById("username").value.trim();
        const age = parseInt(document.getElementById("age").value, 10);
        const password = document.getElementById("password").value;
        const gender = document.querySelector('input[name="gender"]:checked')?.value;

        if (!gender) { alert("Please select gender ⚠️"); return; }
        if (!name.toLowerCase().startsWith("little")) name = "Little " + name;

        const childData = { username, name, age, gender };
        if (!isEditMode || password) childData.password = password;

        const token = localStorage.getItem("jwtToken");

        const url = isEditMode
            ? `http://localhost:8080/api/v1/parent/update/${editingChildId}`
            : "http://localhost:8080/api/v1/parent/save";

        const method = isEditMode ? "PUT" : "POST";

        try {
            const res = await fetch(url, {
                method,
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify(childData)
            });

            if (res.status === 401) {
                alert("Session expired ❌");
                localStorage.removeItem("jwtToken");
                window.location.href = "index.html";
                return;
            }

            if (res.ok) {
                alert(isEditMode ? "Child updated ✅" : "Child created 🎉");
                bootstrap.Modal.getInstance(addChildModalEl).hide();
                loadChildProfiles();
            } else {
                const data = await res.json();
                alert(data.message || "Operation failed ❌");
            }

        } catch (err) {
            console.error(err);
            alert("Server error 🚨");
        }
    }

    addChildForm.addEventListener("submit", addChildFormSubmitHandler);

    // ================= DELETE =================
    async function deleteChild(childId) {
        if (!confirm("Are you sure you want to delete this child? ❌")) return;

        try {
            const token = localStorage.getItem("jwtToken");

            const res = await fetch(`http://localhost:8080/api/v1/parent/delete/${childId}`, {
                method: "DELETE",
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            if (res.status === 401) {
                alert("Session expired ❌");
                localStorage.removeItem("jwtToken");
                window.location.href = "index.html";
                return;
            }

            if (res.ok) {
                alert("Deleted ✅");
                loadChildProfiles();
            } else {
                const data = await res.json();
                alert(data.message || "Failed ❌");
            }

        } catch (err) {
            console.error(err);
            alert("Server error 🚨");
        }
    }

    async function editChild(childId) {
        try {
            const token = localStorage.getItem("jwtToken");

            const res = await fetch("http://localhost:8080/api/v1/parent/children", {
                method: "GET",
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            const children = await res.json();
            const child = children.find(c => c.id === childId);

            if (!child) return alert("Child not found ❌");

            isEditMode = true;
            editingChildId = childId;

            const modal = new bootstrap.Modal(addChildModalEl);
            modal.show();

            setTimeout(() => {
                document.getElementById("childName").value = child.name.replace(/^Little\s/i,'');
                document.getElementById("username").value = child.username;
                document.getElementById("age").value = child.age;
                document.getElementById("password").value = "";

                document.getElementById(child.gender === "boy" ? "boy" : "girl").checked = true;

                submitBtn.textContent = "Update ✨";
            }, 100);

        } catch (err) {
            console.error(err);
            alert("Server error 🚨");
        }
    }


    loadChildProfiles();
</script>
</body>
