<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Users | MiniToons EduHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    :root {
      --rainbow-red:#FF5E78;
      --rainbow-orange:#FF9F43;
      --rainbow-yellow:#FFD93D;
      --rainbow-green:#2ecc71;
      --rainbow-blue:#4D96FF;
      --rainbow-purple:#927DFF;
      --dark-navy:#2D3436;
      --glass: rgba(255,255,255,0.95);
    }
    body { font-family:'Quicksand',sans-serif; background: #ecbcf8; margin:0; }

    /* --- 🚪 Sidebar (Synced & Responsive) --- */
    .sidebar {
      background:var(--glass); backdrop-filter:blur(15px); height:100vh;
      border-right:1px solid rgba(0,0,0,0.08); padding:25px 15px;
      position:fixed; width:260px; display:flex; flex-direction:column;
      transition: all 0.3s ease;
      z-index: 1000;
    }
    .sidebar-brand { font-family:'Fredoka',cursive; text-align:center; margin-bottom:25px; }
    .brand-text { display:flex; justify-content:center; line-height:1; font-size:2.2rem; font-weight:bolder; }

    .nav-link-custom {
      transition:0.3s; border-left:5px solid transparent; margin-bottom:8px;
      font-weight:700; padding:12px 18px; border-radius:12px;
      display:flex; align-items:center; text-decoration:none; color:#636e72; font-size:0.95rem;
    }
    .nav-link-custom:hover, .nav-link-custom.active {
      color: var(--rainbow-purple) !important;
      background: rgba(146,125,255,0.08);
      border-left-color: var(--rainbow-purple);
    }

    /* --- 📝 Main Content --- */
    .main-content { margin-left:260px; padding:40px; transition: all 0.3s ease; }
    .content-card { background:white; border-radius:30px; padding:30px; box-shadow:0 10px 40px rgba(0,0,0,0.03); margin-bottom:30px; }

    .table td:first-child { border-radius:15px 0 0 15px; }
    .table td:last-child { border-radius:0 15px 15px 0; }

    .action-btn { width:35px; height:35px; display:inline-flex; align-items:center; justify-content:center; border-radius:10px; transition:0.3s; cursor:pointer; text-decoration:none; border: none; }
    .btn-delete { background:rgba(255,94,120,0.1); color:var(--rainbow-red); }
    .action-btn:hover { transform:translateY(-3px); color:white !important; }
    .btn-delete:hover { background:var(--rainbow-red); }

    .badge-role { padding:6px 12px; border-radius:15px; color:white; font-weight:700; font-size: 0.85rem; }
    .role-admin { background: var(--rainbow-red); }
    .role-parent { background: var(--rainbow-blue); }
    .role-child { background: var(--rainbow-green); }

    .table-responsive { max-height: 600px; overflow-y: auto; border-radius: 20px; }

    /* 📱 💻 Responsive Breakpoints */
    @media (max-width: 992px) {
      .sidebar { width: 80px; padding: 20px 10px; align-items: center; }
      .sidebar span, .brand-text { display: none !important; }
      .nav-link-custom { width: 50px; height: 50px; justify-content: center; padding: 0; border-radius: 15px; border-left: none; }
      .nav-link-custom i { margin-right: 0 !important; font-size: 1.3rem; }
      .main-content { margin-left: 80px; padding: 25px; }
    }

    @media (max-width: 576px) {
      .main-content { padding: 20px; }

      /* Mobile වලදී Table එක වෙනුවට Cards විදියට පේන්න හදන CSS */
      .table thead { display: none; }
      .table tbody tr {
        display: block;
        margin-bottom: 15px;
        background: white;
        border-radius: 20px;
        padding: 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.02);
      }
      .table td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: none !important;
        padding: 10px 5px !important;
        text-align: right !important;
      }
      .table td::before {
        content: attr(data-label);
        font-weight: 800;
        color: #636e72;
        text-align: left;
      }
      .table td:first-child, .table td:last-child { border-radius: 0 !important; }
      .action-btn { width: 40px; height: 40px; }
    }
  </style>
</head>
<body>

<div class="sidebar shadow-sm">
  <a href="admin-dashboard.html" class="sidebar-brand text-decoration-none">
    <div class="brand-text">
      <span style="color: var(--rainbow-red);">M</span><span style="color: var(--rainbow-orange);">i</span><span style="color: var(--rainbow-yellow);">n</span><span style="color: var(--rainbow-green);">i</span><span style="color: var(--rainbow-blue);">T</span><span style="color: var(--rainbow-purple);">oons</span>
    </div>
    <div class="brand-text" style="font-size: 1.8rem; margin-top: -5px;">
      <span style="color: var(--dark-navy);">Admin</span>🌈
    </div>
  </a>
  <nav class="mt-4 w-100 d-flex flex-column align-items-center align-items-lg-stretch">
    <a href="admin-dashboard.html" class="nav-link-custom"><i class="bi bi-grid-1x2-fill me-2"></i> <span>Overview</span></a>
    <a href="admin-users.html" class="nav-link-custom active"><i class="bi bi-people-fill me-2"></i> <span>Manage Users</span></a>
    <a href="admin-content.html" class="nav-link-custom"><i class="bi bi-play-btn-fill me-2"></i> <span>Content Management</span></a>
  </nav>
  <div class="mt-auto w-100 d-flex flex-column align-items-center align-items-lg-stretch">
    <a href="index.html" class="nav-link-custom text-danger border-0"><i class="bi bi-box-arrow-right me-2"></i> <span>Logout</span></a>
  </div>
</div>

<div class="main-content">
  <h2 class="fw-bold mb-4" style="color: var(--dark-navy);">Manage Users 🧑‍💻</h2>

  <div class="content-card p-3 p-sm-4">
    <div class="table-responsive">
      <table class="table align-middle text-center mb-0" id="usersTable">
        <thead>
        <tr>
          <th>ID</th>
          <th>Username</th>
          <th>Role</th>
          <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const usersTableBody = document.querySelector('#usersTable tbody');
  const API_URL = 'http://localhost:8080/api/admin/users';

  async function loadUsers() {
    try {
      const token = localStorage.getItem("jwtToken");
      const res = await fetch(API_URL, {
        headers: { "Authorization": `Bearer ${token}` }
      });

      if (!res.ok) throw new Error('Failed to fetch users');
      const users = await res.json();

      usersTableBody.innerHTML = '';

      if (users.length === 0) {
        usersTableBody.innerHTML = `<tr><td colspan="4" class="text-center py-4">No users found 😢</td></tr>`;
        return;
      }

      users.forEach(user => {
        const roleClass = user.role === 'ADMIN' ? 'role-admin' :
                user.role === 'PARENT' ? 'role-parent' : 'role-child';

        const tr = document.createElement('tr');
        tr.innerHTML = `
        <td data-label="ID">#${user.id}</td>
        <td data-label="Username"><strong>${user.username}</strong></td>
        <td data-label="Role"><span class="badge-role ${roleClass}">${user.role}</span></td>
        <td data-label="Actions">
          <button class="action-btn btn-delete" onclick="deleteUser(${user.id})">
            <i class="bi bi-trash3-fill"></i>
          </button>
        </td>
      `;
        usersTableBody.appendChild(tr);
      });

    } catch (err) {
      console.error(err);
      usersTableBody.innerHTML = `<tr><td colspan="4" class="text-center py-4 text-danger fw-bold">Error loading users 🚨</td></tr>`;
    }
  }

  async function deleteUser(userId) {
    if (!confirm('Are you sure you want to delete this user? ❌')) return;

    try {
      const token = localStorage.getItem("jwtToken");
      const res = await fetch(`${API_URL}/${userId}`, {
        method: 'DELETE',
        headers: { "Authorization": `Bearer ${token}` }
      });
      const msg = await res.text();
      alert(msg);

      if (msg === 'User deleted successfully') loadUsers();

    } catch (err) {
      console.error(err);
      alert('Error deleting user');
    }
  }

  window.addEventListener('DOMContentLoaded', loadUsers);
</script>
</body>
</html>
