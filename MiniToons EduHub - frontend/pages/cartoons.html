<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartoon World | MiniToons</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --rainbow-red: #FF5E78;
            --rainbow-orange: #FF9F43;
            --rainbow-yellow: #FFD93D;
            --rainbow-green: #2ecc71;
            --rainbow-blue: #4D96FF;
            --rainbow-purple: #927DFF;
            --dark-navy: #2D3436;
            --glass: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: #ec2997; /* ඔයා දාපු background color එක */
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }


        .sidebar {
            background: var(--glass);
            backdrop-filter: blur(15px);
            height: 100vh;
            border-right: 1px solid rgba(0,0,0,0.08);
            padding: 25px 15px;
            position: fixed;
            width: 260px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        .sidebar-brand { font-family: 'Fredoka', cursive; text-align: center; margin-bottom: 25px; text-decoration: none; display: block; }
        .brand-text { display: flex; justify-content: center; line-height: 1; font-size: 2.2rem; font-weight: bolder; }

        .child-profile-box { text-align: center; background: white; border-radius: 25px; padding: 15px; margin-bottom: 20px; border: 2px solid rgba(0,0,0,0.03); position: relative; /* 👈 Mobile oval effect එකට */ }
        .avatar-img { width: 65px; height: 65px; background: #f0f4f8; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; margin: 0 auto 10px; border: 3px solid var(--rainbow-blue); position: relative; z-index: 2; /* 👈 Mobile view එකට */ }

        .nav-link-custom { transition: all 0.3s; border-left: 5px solid transparent; margin-bottom: 5px; font-weight: 700; padding: 10px 18px; border-radius: 12px; display: flex; align-items: center; text-decoration: none; color: #636e72; font-size: 0.95rem; }
        .nav-link-custom i { font-size: 1.1rem; margin-right: 12px; }

        .nav-cartoons.active {
            color: var(--rainbow-red) !important;
            background: rgba(255, 94, 120, 0.08);
            border-left-color: var(--rainbow-red);
        }

        .nav-link-custom:hover {
            color: var(--rainbow-purple) !important;
            background: rgba(146, 125, 255, 0.08);
            border-left-color: var(--rainbow-purple);
            transform: translateX(5px);
        }

        .logout-container {
            margin-top: auto;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 15px;
        }

        .btn-logout {
            color: var(--rainbow-red) !important;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            padding: 12px 18px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .btn-logout:hover {
            background: rgba(255, 94, 120, 0.08);
            transform: translateX(5px);
        }


        .main-content {
            margin-left: 260px;
            padding: 35px;
            flex: 1;
            height: 100vh;
            overflow-y: auto;
        }


        .video-card {
            background: white;
            border-radius: 25px;
            overflow: hidden;
            border: 5px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: 0.3s;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .video-title {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            color: var(--dark-navy);
            margin: 15px;
            flex-grow: 1;
        }


        @media (max-width: 992px) {

            .sidebar {
                width: 90px;
                padding: 20px 10px;
                align-items: center;
                background: #FFFDF5;
            }
            .sidebar span, .sidebar-brand, .child-profile-box h6, .child-profile-box small {
                display: none !important;
            }
            .main-content { margin-left: 90px; padding: 20px; }

            .child-profile-box {
                background: transparent;
                border: none;
                padding: 0;
                margin-bottom: 25px;
                width: 65px;
                display: flex;
                justify-content: center;
            }
            .child-profile-box::before {
                content: '';
                position: absolute;
                top: 50%; left: 50%;
                transform: translate(-50%, -50%);
                width: 45px; height: 85px;
                background: white;
                border-radius: 25px;
                z-index: 1;
            }
            .avatar-img {
                width: 60px; height: 60px;
                font-size: 1.8rem;
                margin: 0;
                background: white;
                border: 4px solid var(--rainbow-blue);
                box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            }


            .nav-links {
                display: flex;
                flex-direction: column;
                gap: 15px;
                align-items: center;
                width: 100%;
            }
            .nav-link-custom {
                width: 50px; height: 50px;
                justify-content: center;
                padding: 0;
                border-radius: 18px;
                border-left: none;
            }
            .nav-link-custom:hover { transform: none; }
            .nav-link-custom i { font-size: 1.5rem; margin-right: 0; }


            .nav-cartoons.active {
                color: var(--rainbow-red) !important;
                background: #FFF0F2;
            }


            .logout-container { border-top: none; }
            .btn-logout {
                width: 50px; height: 50px;
                justify-content: center;
                padding: 0;
                border-radius: 18px;
                display: flex;
                align-items: center;
            }
            .btn-logout:hover { transform: none; }
            .btn-logout i { font-size: 1.5rem; margin-right: 0; }
        }
    </style>
</head>
<body>

<div class="sidebar shadow-sm">
    <a href="#" class="sidebar-brand">
        <div class="brand-text">
            <span style="color: var(--rainbow-red);">M</span><span style="color: var(--rainbow-orange);">i</span><span style="color: var(--rainbow-yellow);">n</span><span style="color: var(--rainbow-green);">i</span><span style="color: var(--rainbow-blue);">T</span><span style="color: var(--rainbow-purple);">oons</span>
        </div>
        <div class="brand-text" style="font-size:1.8rem; margin-top:-5px;">
            <span style="color: var(--dark-navy);">Edu</span><span style="color: var(--rainbow-blue);">Hub</span>🌈
        </div>
    </a>

    <div class="child-profile-box shadow-sm">
        <div class="avatar-img" id="sidebar-avatar">👦</div>
        <h6 class="fw-bold mb-0" style="color: var(--dark-navy);" id="sidebar-name">Little Adventurer</h6>
        <small class="text-muted fw-bold" id="sidebar-level">Explorer</small>
    </div>

    <nav class="nav-links">
        <a href="child-dashboard.html" class="nav-link-custom nav-dashboard" title="Dashboard"><i class="bi bi-grid-1x2-fill"></i> <span>Dashboard</span></a>
        <a href="lessons.html" class="nav-link-custom nav-lessons" title="Lessons"><i class="bi bi-book-half"></i> <span>Lessons</span></a>
        <a href="songs.html" class="nav-link-custom nav-songs" title="Fun Songs"><i class="bi bi-music-note-beamed"></i> <span>Fun Songs</span></a>
        <a href="cartoons.html" class="nav-link-custom nav-cartoons active" title="Cartoons"><i class="bi bi-play-circle-fill"></i> <span>Cartoons</span></a>
        <a href="quizzes.html" class="nav-link-custom nav-quizzes" title="Quizzes"><i class="bi bi-trophy-fill"></i> <span>Quizzes</span></a>
    </nav>

    <div class="logout-container">
        <a href="index.html" class="btn-logout" id="logout-btn" title="Logout">
            <i class="bi bi-box-arrow-right"></i> <span>Logout</span>
        </a>
    </div>
</div>

<div class="main-content">
    <h1 class="fw-bold mb-4" style="font-family: 'Fredoka'; color: white;">MiniToons Cartoon World 📺</h1>

    <div class="row g-4" id="cartoon-container">
        <div class="text-center text-white fw-bold fs-4">Loading fun cartoons for you... ⏳</div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {

        const name = sessionStorage.getItem("childName");
        const gender = sessionStorage.getItem("childGender");
        const level = sessionStorage.getItem("childLevel");

        if (name) document.getElementById("sidebar-name").innerText = name;
        if (level) document.getElementById("sidebar-level").innerText = level;

        const avatarElement = document.getElementById("sidebar-avatar");
        if (gender && avatarElement) {
            const upperGender = gender.toUpperCase();
            if (upperGender === "FEMALE" || upperGender === "GIRL") {
                avatarElement.innerText = "👧";
                avatarElement.style.borderColor = "var(--rainbow-red)";
            } else {
                avatarElement.innerText = "👦";
                avatarElement.style.borderColor = "var(--rainbow-blue)";
            }
        }


        loadCartoonsFromBackend();
    });

    function loadCartoonsFromBackend() {
        const token = localStorage.getItem("jwtToken");
        const container = document.getElementById("cartoon-container");


        fetch('http://localhost:8080/api/v1/cartoons', {
            method: 'GET',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            }
        })
            .then(response => response.json())
            .then(data => {
                container.innerHTML = "";


                const activeCartoons = data.filter(cartoon => cartoon.status === "Active");

                if (activeCartoons.length === 0) {
                    container.innerHTML = "<div class='text-center text-white fw-bold fs-4'>No cartoons added yet! 🐻</div>";
                    return;
                }

                activeCartoons.forEach(cartoon => {
                    const videoId = extractYouTubeId(cartoon.videoUrl);

                    if (videoId) {
                        const cardCol = document.createElement("div");
                        cardCol.className = "col-md-6 col-lg-4";

                        cardCol.innerHTML = `
                        <div class="video-card">
                            <div class="video-container">
                                <iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>
                            </div>
                            <h5 class="video-title">${cartoon.title} 🎬</h5>
                            <div class="px-3 pb-3 d-flex justify-content-between align-items-center">
                                <span class="badge bg-primary rounded-pill">${cartoon.category}</span>
                                <small class="text-muted fw-bold">${cartoon.ageGroup}</small>
                            </div>
                        </div>
                    `;
                        container.appendChild(cardCol);
                    }
                });
            })
            .catch(error => {
                console.error('Error fetching cartoons:', error);
                container.innerHTML = "<div class='text-center text-white fw-bold fs-4'>Oops! Failed to load cartoons. ❌</div>";
            });
    }


    function extractYouTubeId(url) {
        if (!url) return null;
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }
</script>

</body>
</html>
