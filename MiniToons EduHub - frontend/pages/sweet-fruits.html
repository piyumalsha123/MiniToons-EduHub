<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Fruits | MiniToons EduHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

    <style>
        :root {
            --rainbow-red: #FF5E78;
            --rainbow-orange: #FF9F43;
            --rainbow-yellow: #FFD93D;
            --rainbow-green: #2ecc71;
            --rainbow-blue: #4D96FF;
            --rainbow-purple: #927DFF;
            --dark-navy: #2D3436;
            --glass: rgba(255, 255, 255, 0.95);

            --fr-apple: #FFEBEE;  --txt-apple: #D32F2F;
            --fr-banana: #FFFDE7; --txt-banana: #FBC02D;
            --fr-orange: #FFF3E0; --txt-orange: #EF6C00;
            --fr-grapes: #F3E5F5; --txt-grapes: #7B1FA2;
            --fr-mango: #FFF9C4;  --txt-mango: #FFA000;
            --fr-strawberry: #FCE4EC; --txt-strawberry: #C2185B;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: #cfb5f6;
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* 🚪 Sidebar Styles */
        .sidebar {
            background: var(--glass);
            backdrop-filter: blur(15px);
            height: 100vh;
            border-right: 1px solid rgba(0,0,0,0.08);
            padding: 25px 15px;
            position: fixed;
            width: 260px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-brand { font-family: 'Fredoka', cursive; text-align: center; margin-bottom: 25px; text-decoration: none; display: block; }
        .brand-text { display: flex; justify-content: center; line-height: 1; font-size: 2.2rem; font-weight: bolder; }

        .child-profile-box { text-align: center; background: white; border-radius: 25px; padding: 15px; margin-bottom: 20px; border: 2px solid rgba(0,0,0,0.03); cursor:pointer; }
        .avatar-img { width: 65px; height: 65px; background: #f0f4f8; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; margin: 0 auto 10px; border: 3px solid var(--rainbow-blue); }

        .nav-link-custom { transition: all 0.3s; border-left: 5px solid transparent; margin-bottom: 5px; font-weight: 700; padding: 10px 18px; border-radius: 12px; display: flex; align-items: center; text-decoration: none; color: #636e72; font-size: 0.95rem; }
        .nav-link-custom i { font-size: 1.1rem; margin-right: 12px; }

        .nav-lessons.active {
            color: var(--rainbow-green) !important;
            background: rgba(46, 204, 113, 0.08);
            border-left-color: var(--rainbow-green);
        }

        .nav-link-custom:hover {
            color: var(--rainbow-purple) !important;
            background: rgba(146, 125, 255, 0.08);
            border-left-color: var(--rainbow-purple);
            transform: translateX(5px);
        }

        .logout-container {
            margin-top: auto;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 15px;
        }

        .btn-logout {
            color: var(--rainbow-red) !important;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            padding: 12px 18px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .btn-logout:hover {
            background: rgba(255, 94, 120, 0.08);
            transform: translateX(5px);
        }

        /* 📝 Main Content Area */
        .main-content {
            margin-left: 260px;
            padding: 35px;
            flex: 1;
            height: 100vh;
            overflow-y: auto;
            text-align: center;
            position: relative;
        }

        .main-content::before { content: "🍋"; position: absolute; top: 5%; left: 3%; font-size: 2.5rem; opacity: 0.2; animation: float 6s infinite ease-in-out;}
        .main-content::after { content: "🍒"; position: absolute; bottom: 10%; right: 5%; font-size: 2.5rem; opacity: 0.2; animation: float 4s infinite ease-in-out;}

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(15deg); }
        }

        .main-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(to right, #FF5E78, #FF9F43, #FFD93D, #2ecc71, #4D96FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            filter: drop-shadow(3px 3px 0px white);
            display: block;
        }

        /* Grid & Cards */
        .fruit-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(135px, 1fr));
            gap: 20px;
            margin-top: 35px;
            padding-bottom: 20px;
        }

        .fruit-card {
            height: 140px;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 0 rgba(0,0,0,0.03);
            border: 5px solid white;
            position: relative;
            background: white;
        }

        .fruit-card:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 15px 25px rgba(0,0,0,0.08);
        }

        .fruit-emoji { font-size: 3.2rem; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1)); }
        .fruit-name { font-family: 'Fredoka', sans-serif; font-weight: 700; margin-top: 5px; font-size: 1.1rem; }

        .new-badge {
            position: absolute; top: -5px; right: -5px;
            background: var(--rainbow-red); color: white; font-size: 0.75rem;
            padding: 3px 10px; border-radius: 12px; font-weight: 700;
        }

        /* 🔙 Buttons Styles */
        .btn-back, .btn-quiz-unlock {
            background: white;
            color: var(--dark-navy);
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            border: 4px solid var(--rainbow-blue);
            border-radius: 20px;
            padding: 12px 30px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            display: inline-flex;
            align-items: center;
            text-decoration: none;
        }

        .btn-back:hover {
            transform: translateY(-3px);
            background: var(--rainbow-blue);
            color: white;
            box-shadow: 0 8px 20px rgba(77, 150, 255, 0.3);
        }

        .btn-quiz-unlock {
            border-color: var(--rainbow-green);
            color: var(--rainbow-green);
        }

        .btn-quiz-unlock:hover {
            transform: translateY(-3px);
            background: var(--rainbow-green);
            color: white;
            box-shadow: 0 8px 20px rgba(46, 204, 113, 0.3);
        }

        /* Fruit Themes */
        .c-apple { background: var(--fr-apple); color: var(--txt-apple); }
        .c-banana { background: var(--fr-banana); color: var(--txt-banana); }
        .c-orange { background: var(--fr-orange); color: var(--txt-orange); }
        .c-grapes { background: var(--fr-grapes); color: var(--txt-grapes); }
        .c-mango { background: var(--fr-mango); color: var(--txt-mango); }
        .c-strawberry { background: var(--fr-strawberry); color: var(--txt-strawberry); }
        .c-watermelon { background: #E8F5E9; color: #2E7D32; }
        .c-kiwi { background: #F1F8E9; color: #558B2F; }
        .c-cherry { background: #FFEBEE; color: #B71C1C; }
        .c-pear { background: #F9FBE7; color: #827717; }
        .c-avocado { background: #F1F8E9; color: #33691E; }
        .c-peach { background: #FFF3E0; color: #E65100; }
        .c-pineapple { background: #FFFDE7; color: #F57F17; }

        /* Lesson Modal */
        .modal-content { border: none; border-radius: 40px; }
        .modal-body { padding: 45px 35px; }
        .big-fruit { font-size: 6.5rem; }
        .modal-fruit-title { font-family: 'Fredoka'; font-size: 3.2rem; font-weight: 700; }
        .pill-info { padding: 8px 22px; border-radius: 35px; font-weight: 700; display: inline-block; margin: 5px; background: #f8f9fa; }

        @media (max-width: 992px) { .sidebar { width: 80px; } .sidebar span, .brand-text { display: none; } .main-content { margin-left: 80px; } }
    </style>
</head>
<body>

<div class="sidebar shadow-sm">
    <a href="#" class="sidebar-brand">
        <div class="brand-text">
            <span style="color: var(--rainbow-red);">M</span><span style="color: var(--rainbow-orange);">i</span><span style="color: var(--rainbow-yellow);">n</span><span style="color: var(--rainbow-green);">i</span><span style="color: var(--rainbow-blue);">T</span><span style="color: var(--rainbow-purple);">oons</span>
        </div>
        <div class="brand-text" style="font-size:1.8rem; margin-top:-5px;">
            <span style="color: var(--dark-navy);">Edu</span><span style="color: var(--rainbow-blue);">Hub</span>🌈
        </div>
    </a>

    <a href="profile.html" class="text-decoration-none">
        <div class="child-profile-box shadow-sm" style="cursor: pointer; transition: 0.3s;">
            <div class="avatar-img" id="sidebar-avatar">👦</div>
            <h6 class="fw-bold mb-0" style="color: var(--dark-navy);" id="sidebar-name">Little Adventurer</h6>
            <small class="text-muted fw-bold" id="sidebar-level">Explorer</small>
        </div>
    </a>

    <nav class="nav-links">
        <a href="child-dashboard.html" class="nav-link-custom nav-dashboard"><i class="bi bi-grid-1x2-fill"></i> <span>Dashboard</span></a>
        <a href="lessons.html" class="nav-link-custom nav-lessons active"><i class="bi bi-book-half"></i> <span>Lessons</span></a>
        <a href="songs.html" class="nav-link-custom nav-songs"><i class="bi bi-music-note-beamed"></i> <span>Fun Songs</span></a>
        <a href="cartoons.html" class="nav-link-custom nav-cartoons"><i class="bi bi-play-circle-fill"></i> <span>Cartoons</span></a>
        <a href="quizzes.html" class="nav-link-custom nav-quizzes"><i class="bi bi-trophy-fill"></i> <span>Quizzes</span></a>
    </nav>

    <div class="logout-container">
        <a href="index.html" class="btn-logout" id="logout-btn">
            <i class="bi bi-box-arrow-right me-2"></i> <span>Logout</span>
        </a>
    </div>
</div>

<div class="main-content">
    <div class="mb-3">
        <h1 class="main-title animate__animated animate__pulse animate__infinite">Sweet Fruits 🍎</h1>
        <p class="lead fw-bold text-muted" style="font-size: 1rem;">Click a fruit to explore its healthy magic!</p>
        <div class="alert alert-info d-inline-block rounded-pill fw-bold py-1 px-4 mb-0" style="font-size: 0.9rem;" id="progressInfo">
            Tap all 13 fruits to unlock the Quiz! 🔓 (0/13)
        </div>
    </div>

    <div class="fruit-grid" id="fruitGrid"></div>

    <div class="mt-4 mb-3 d-flex justify-content-center gap-3" id="actionButtons">
        <a href="lessons.html" class="btn btn-back animate__animated animate__fadeInUp" style="animation-delay: 0.5s;">
            <i class="bi bi-arrow-left-circle-fill me-2"></i> Back to Lessons
        </a>
    </div>
</div>

<div class="modal fade" id="fruitModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content animate__animated animate__bounceIn">
            <div class="modal-body text-center">
                <button type="button" class="btn-close float-end" data-bs-dismiss="modal"></button>
                <div id="mEmoji" class="big-fruit animate__animated animate__tada animate__infinite animate__slow">🍎</div>
                <h2 id="mName" class="modal-fruit-title"></h2>
                <div class="mt-2">
                    <span class="pill-info" id="mTaste" style="color: var(--rainbow-red);"></span>
                    <span class="pill-info" id="mBenefit" style="color: var(--rainbow-green);"></span>
                </div>
                <p id="mFact" class="mt-4 fw-bold text-muted italic" style="font-size: 1.05rem;"></p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    const fruitList = [
        { name: "Apple", emoji: "🍎", taste: "Crunchy & Sweet", benefit: "Strong Heart", theme: "c-apple", fact: "Apples can float in water because they are 25% air!" },
        { name: "Banana", emoji: "🍌", taste: "Sweet & Soft", benefit: "Fast Energy", theme: "c-banana", fact: "Bananas are actually giant herbs, not trees!" },
        { name: "Orange", emoji: "🍊", taste: "Sweet & Tangy", benefit: "Strong Body", theme: "c-orange", fact: "Oranges are full of Vitamin C to keep you healthy!" },
        { name: "Grapes", emoji: "🍇", taste: "Juicy & Sweet", benefit: "Sharp Mind", theme: "c-grapes", fact: "Grapes are technically berries!" },
        { name: "Mango", emoji: "🥭", taste: "Rich & Sweet", benefit: "Bright Eyes", theme: "c-mango", fact: "Mango is called the King of Fruits!" },
        { name: "Strawberry", emoji: "🍓", taste: "Sweet & Berry", benefit: "White Teeth", theme: "c-strawberry", fact: "Strawberries are the only fruit with seeds on the outside!" },
        { name: "Watermelon", emoji: "🍉", taste: "Cool & Fresh", benefit: "Stay Hydrated", theme: "c-watermelon", fact: "Watermelons are 92% water!" },
        { name: "Avocado", emoji: "🥑", taste: "Creamy & Nutty", benefit: "Healthy Brain", theme: "c-avocado", fact: "Avocados have more potassium than bananas!" },
        { name: "Pineapple", emoji: "🍍", taste: "Sweet & Sharp", benefit: "Good Digestion", theme: "c-pineapple", fact: "It takes almost 2 years for a pineapple to grow!" },
        { name: "Pear", emoji: "🍐", taste: "Sweet & Juicy", benefit: "Strong Bones", theme: "c-pear", fact: "There are over 3,000 varieties of pears!" },
        { name: "Cherry", emoji: "🍒", taste: "Sweet & Tart", benefit: "Good Sleep", theme: "c-cherry", fact: "One cherry tree can grow about 7,000 cherries!" },
        { name: "Peach", emoji: "🍑", taste: "Fuzzy & Sweet", benefit: "Soft Skin", theme: "c-peach", fact: "Peaches were first grown in China long ago!" },
        { name: "Kiwi", emoji: "🥝", taste: "Tangy & Sweet", benefit: "Boost Immune", theme: "c-kiwi", fact: "Kiwifruit has more Vitamin C than an orange!" }
    ];

    const grid = document.getElementById('fruitGrid');
    const modal = new bootstrap.Modal(document.getElementById('fruitModal'));

    let viewedFruits = new Set();
    let quizButtonAdded = false;

    fruitList.forEach((fruit, index) => {
        const card = document.createElement('div');
        card.className = `fruit-card ${fruit.theme} animate__animated animate__fadeInUp`;
        card.style.animationDelay = `${index * 0.05}s`;
        card.id = `fruit-${index}`;

        card.innerHTML = `
            <span class="new-badge" id="badge-${index}">New</span>
            <div class="fruit-emoji">${fruit.emoji}</div>
            <div class="fruit-name">${fruit.name}</div>
        `;

        card.onclick = () => {
            document.getElementById('mEmoji').innerText = fruit.emoji;
            document.getElementById('mName').innerText = fruit.name;
            document.getElementById('mTaste').innerText = `😋 ${fruit.taste}`;
            document.getElementById('mBenefit').innerText = `💪 ${fruit.benefit}`;
            document.getElementById('mFact').innerText = `"${fruit.fact}"`;

            modal.show();

            viewedFruits.add(index);

            const badge = document.getElementById(`badge-${index}`);
            if (badge) badge.remove();

            document.getElementById('progressInfo').innerText = `Tap all 13 fruits to unlock the Quiz! 🔓 (${viewedFruits.size}/13)`;


            if (viewedFruits.size === fruitList.length && !quizButtonAdded) {
                const actionButtons = document.getElementById('actionButtons');
                const quizBtn = document.createElement('a');
                quizBtn.href = "fruits-quiz.html";
                quizBtn.className = "btn btn-quiz-unlock animate__animated animate__rubberBand";
                quizBtn.innerHTML = `<i class="bi bi-trophy-fill me-2"></i> Play Fruits Quiz`;
                actionButtons.appendChild(quizBtn);
                quizButtonAdded = true;
            }
        };
        grid.appendChild(card);
    });


    document.getElementById('fruitModal').addEventListener('hidden.bs.modal', function () {
        if (viewedFruits.size === fruitList.length) {
            Swal.fire({
                title: 'Awesome! 🌟',
                text: 'You checked all the fruits! Now let\'s play the quiz!',
                icon: 'success',
                timer: 2000,
                showConfirmButton: false
            }).then(() => {
                window.location.href = "fruits-quiz.html";
            });
        }
    });


    document.addEventListener("DOMContentLoaded", function() {
        const name = sessionStorage.getItem("childName");
        const gender = sessionStorage.getItem("childGender");
        const level = sessionStorage.getItem("childLevel");

        const nameElement = document.getElementById("sidebar-name");
        if (name && nameElement) nameElement.innerText = name;

        const avatarElement = document.getElementById("sidebar-avatar");
        if (gender && avatarElement) {
            const upperGender = gender.toUpperCase();
            if (upperGender === "FEMALE" || upperGender === "GIRL") {
                avatarElement.innerText = "👧";
                avatarElement.style.borderColor = "var(--rainbow-red)";
            } else {
                avatarElement.innerText = "👦";
                avatarElement.style.borderColor = "var(--rainbow-blue)";
            }
        }

        const levelElement = document.getElementById("sidebar-level");
        if (level && levelElement) levelElement.innerText = level;

        const logoutBtn = document.getElementById("logout-btn");
        if(logoutBtn) {
            logoutBtn.addEventListener("click", function() {
                sessionStorage.clear();
            });
        }
    });
</script>

</body>
</html>
