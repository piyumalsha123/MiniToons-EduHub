<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorful Veggies | MiniToons EduHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

    <style>
        :root {
            --v-orange: #FFF3E0; --t-orange: #E65100;
            --v-red: #FFEBEE;    --t-red: #C62828;
            --v-purple: #F3E5F5; --t-purple: #4A148C;
            --v-yellow: #FFFDE7; --t-yellow: #FBC02D;
            --v-green: #E8F5E9;  --t-green: #2E7D32;
            --v-white: #FAFAFA;  --t-white: #5D4037;
            --rainbow-red: #FF5E78;
            --rainbow-orange: #FF9F43;
            --rainbow-yellow: #FFD93D;
            --rainbow-green: #2ecc71;
            --rainbow-blue: #4D96FF;
            --rainbow-purple: #927DFF;
            --dark-navy: #2D3436;
            --glass: rgba(255, 255, 255, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle, #bae4a5 0%, #9df176 100%);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }


        .sidebar {
            background: var(--glass);
            backdrop-filter: blur(15px);
            height: 100vh;
            border-right: 1px solid rgba(0,0,0,0.08);
            padding: 25px 15px;
            position: fixed;
            width: 260px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-brand { font-family: 'Fredoka', cursive; text-align: center; margin-bottom: 25px; text-decoration: none; display: block; }
        .brand-text { display: flex; justify-content: center; line-height: 1; font-size: 2.2rem; font-weight: bolder; }

        .child-profile-box { text-align: center; background: white; border-radius: 25px; padding: 15px; margin-bottom: 20px; border: 2px solid rgba(0,0,0,0.03); cursor:pointer; }
        .avatar-img { width: 65px; height: 65px; background: #f0f4f8; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; margin: 0 auto 10px; border: 3px solid var(--rainbow-blue); }

        .nav-link-custom { transition: all 0.3s; border-left: 5px solid transparent; margin-bottom: 5px; font-weight: 700; padding: 10px 18px; border-radius: 12px; display: flex; align-items: center; text-decoration: none; color: #636e72; font-size: 0.95rem; }
        .nav-link-custom i { font-size: 1.1rem; margin-right: 12px; }

        .nav-lessons.active {
            color: var(--rainbow-purple) !important;
            background: rgba(146, 125, 255, 0.08);
            border-left-color: var(--rainbow-purple);
        }

        .nav-link-custom:hover {
            color: var(--rainbow-purple) !important;
            background: rgba(146, 125, 255, 0.08);
            border-left-color: var(--rainbow-purple);
            transform: translateX(5px);
        }

        .logout-container {
            margin-top: auto;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 15px;
        }

        .btn-logout {
            color: var(--rainbow-red) !important;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            padding: 12px 18px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .btn-logout:hover {
            background: rgba(255, 94, 120, 0.08);
            transform: translateX(5px);
        }

        /* 📝 Main Content Area */
        .main-content {
            margin-left: 260px;
            padding: 35px;
            flex: 1;
            height: 100vh;
            overflow-y: auto;
        }

        .lesson-container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            padding: 20px;
        }

        .main-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 4.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #FF9800, #F44336, #9C27B0, #4CAF50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            filter: drop-shadow(3px 3px 0px white);
            display: block;
        }

        .veggie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .veggie-card {
            height: 160px;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 0 rgba(0,0,0,0.02);
            border: 6px solid white;
            position: relative;
        }

        .veggie-card:hover {
            transform: translateY(-12px) rotate(2deg) scale(1.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .veggie-emoji { font-size: 4.5rem; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1)); }
        .veggie-name { font-family: 'Fredoka', sans-serif; font-weight: 700; margin-top: 5px; font-size: 1.3rem; }


        .c-orange { background: var(--v-orange); color: var(--t-orange); }
        .c-red { background: var(--v-red); color: var(--t-red); }
        .c-purple { background: var(--v-purple); color: var(--t-purple); }
        .c-yellow { background: var(--v-yellow); color: var(--t-yellow); }
        .c-green { background: var(--v-green); color: var(--t-green); }
        .c-white { background: var(--v-white); color: var(--t-white); }

        .back-btn {
            margin-top: 40px;
            padding: 15px 45px;
            border-radius: 50px;
            background: white;
            color: #FF9800;
            text-decoration: none;
            font-weight: 700;
            display: inline-block;
            transition: 0.3s;
            border: 3px solid #FFF3E0;
        }

        /* Modal */
        .modal-content { border: none; border-radius: 60px; }
        .modal-body { padding: 60px 40px; }
        .big-emoji { font-size: 9rem; }
        .modal-v-title { font-family: 'Fredoka'; font-size: 4.5rem; font-weight: 700; }
        .pill { padding: 10px 25px; border-radius: 40px; font-weight: 700; display: inline-block; margin: 5px; background: #f8f9fa; font-size: 1.1rem; }

        .new-badge {
            position: absolute;
            top: 10px;
            right: 15px;
            background: #FF5E78;
            color: white;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 700;
        }

        @media (max-width: 992px) {
            .sidebar { width: 80px; }
            .sidebar span, .brand-text { display: none; }
            .main-content { margin-left: 80px; }
        }
    </style>
</head>
<body>

<div class="sidebar shadow-sm">
    <a href="#" class="sidebar-brand">
        <div class="brand-text">
            <span style="color: var(--rainbow-red);">M</span><span style="color: var(--rainbow-orange);">i</span><span style="color: var(--rainbow-yellow);">n</span><span style="color: var(--rainbow-green);">i</span><span style="color: var(--rainbow-blue);">T</span><span style="color: var(--rainbow-purple);">oons</span>
        </div>
        <div class="brand-text" style="font-size:1.8rem; margin-top:-5px;">
            <span style="color: var(--dark-navy);">Edu</span><span style="color: var(--rainbow-blue);">Hub</span>🌈
        </div>
    </a>

    <a href="profile.html" class="text-decoration-none">
        <div class="child-profile-box shadow-sm" style="cursor: pointer; transition: 0.3s;">
            <div class="avatar-img" id="sidebar-avatar">👦</div>
            <h6 class="fw-bold mb-0" style="color: var(--dark-navy);" id="sidebar-name">Little Adventurer</h6>
            <small class="text-muted fw-bold" id="sidebar-level">Explorer</small>
        </div>
    </a>

    <nav class="nav-links">
        <a href="child-dashboard.html" class="nav-link-custom nav-dashboard"><i class="bi bi-grid-1x2-fill"></i> <span>Dashboard</span></a>
        <a href="lessons.html" class="nav-link-custom nav-lessons active"><i class="bi bi-book-half"></i> <span>Lessons</span></a>
        <a href="songs.html" class="nav-link-custom nav-songs"><i class="bi bi-music-note-beamed"></i> <span>Fun Songs</span></a>
        <a href="cartoons.html" class="nav-link-custom nav-cartoons"><i class="bi bi-play-circle-fill"></i> <span>Cartoons</span></a>
        <a href="quizzes.html" class="nav-link-custom nav-quizzes"><i class="bi bi-trophy-fill"></i> <span>Quizzes</span></a>
    </nav>

    <div class="logout-container">
        <a href="index.html" class="btn-logout" id="logout-btn">
            <i class="bi bi-box-arrow-right me-2"></i> <span>Logout</span>
        </a>
    </div>
</div>

<div class="main-content">
    <div class="lesson-container">
        <h1 class="main-title animate__animated animate__rubberBand animate__infinite animate__slow">Colorful Veggies 🥗</h1>
        <p class="lead fw-bold text-muted">A rainbow of veggies makes you a Super Kid!</p>

        <div class="alert alert-light d-inline-block rounded-pill fw-bold py-2 px-4 shadow-sm" id="progressInfo">
            Tap all veggies to unlock the Quiz! 🔓 (0/19)
        </div>

        <div class="veggie-grid" id="veggieGrid"></div>

        <a href="lessons.html" class="back-btn">
            <i class="fas fa-arrow-left me-2"></i> Back to Lessons
        </a>
    </div>
</div>

<div class="modal fade" id="vModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content animate__animated animate__zoomInDown">
            <div class="modal-body text-center">
                <button type="button" class="btn-close float-end" data-bs-dismiss="modal"></button>
                <div id="mEmoji" class="big-emoji animate__animated animate__bounce animate__infinite animate__slow">🥕</div>
                <h2 id="mName" class="modal-v-title"></h2>
                <div class="mt-3">
                    <span class="pill" id="mBenefit"></span>
                    <span class="pill" id="mColor"></span>
                </div>
                <p id="mFact" class="mt-4 fw-bold text-muted italic" style="font-size: 1.3rem;"></p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    const veggies = [
        { name: "Carrot", emoji: "🥕", benefit: "Bright Eyes", color: "🧡 Orange", theme: "c-orange", fact: "Eating carrots helps you see better in the dark!" },
        { name: "Pumpkin", emoji: "🎃", benefit: "Healthy Skin", color: "🧡 Orange", theme: "c-orange", fact: "Pumpkins can grow to be as big as a car!" },
        { name: "Tomato", emoji: "🍅", benefit: "Healthy Heart", color: "❤️ Red", theme: "c-red", fact: "Tomatoes are a juicy super-fruit that we eat as a veggie!" },
        { name: "Eggplant", emoji: "🍆", benefit: "Brain Power", color: "💜 Purple", theme: "c-purple", fact: "Eggplants have a shiny purple skin like a royal robe!" },
        { name: "Corn", emoji: "🌽", benefit: "Full of Energy", color: "💛 Yellow", theme: "c-yellow", fact: "Corn is one of the world's most popular snacks!" },
        { name: "Potato", emoji: "🥔", benefit: "Play Power", color: "🟤 Brown", theme: "c-white", fact: "Potatoes were the first veggie grown in space!" },
        { name: "Onion", emoji: "🧅", benefit: "Bye-Bye Germs", color: "💜 Purple", theme: "c-purple", fact: "Onions have many layers, just like a little puzzle!" },
        { name: "Broccoli", emoji: "🥦", benefit: "Strong Muscles", color: "💚 Green", theme: "c-green", fact: "Broccoli looks like a tiny green forest tree!" },
        { name: "Cucumber", emoji: "🥒", benefit: "Stay Cool", color: "💚 Green", theme: "c-green", fact: "Cucumbers are 95% water—very refreshing!" },
        { name: "Bell Pepper", emoji: "🫑", benefit: "Super Immunity", color: "💚 Green", theme: "c-green", fact: "Peppers are hollow inside and very crunchy!" },
        { name: "Mushroom", emoji: "🍄", benefit: "Grow Tall", color: "⚪ White", theme: "c-white", fact: "Mushrooms can grow in the dark and pop up overnight!" },
        { name: "Garlic", emoji: "🧄", benefit: "Fight Colds", color: "⚪ White", theme: "c-white", fact: "Garlic is a natural medicine for your body!" },
        { name: "Ginger", emoji: "🫚", benefit: "Happy Tummy", color: "🟤 Brown", theme: "c-white", fact: "Ginger is a root that grows underground!" },
        { name: "Chili", emoji: "🌶️", benefit: "Fast Energy", color: "❤️ Red", theme: "c-red", fact: "Chilis are the spiciest friends in the garden!" },
        { name: "Sweet Potato", emoji: "🍠", benefit: "Healthy Gut", color: "🧡 Orange", theme: "c-orange", fact: "Sweet potatoes are sweeter and softer than normal potatoes!" },
        { name: "Leeks", emoji: "🥗", benefit: "Iron Power", color: "💚 Green", theme: "c-green", fact: "Leeks look like very giant green onions!" },
        { name: "Peas", emoji: "🫛", benefit: "Smart Brain", color: "💚 Green", theme: "c-green", fact: "Peas live in a little green pod house!" },
        { name: "Cauliflower", emoji: "🥦", benefit: "Strong Bones", color: "⚪ White", theme: "c-white", fact: "Cauliflower is like a white broccoli!" },
        { name: "Bitter Gourd", emoji: "🥒", benefit: "Pure Blood", color: "💚 Green", theme: "c-green", fact: "It is bitter but it makes you super healthy!" }
    ];

    const grid = document.getElementById('veggieGrid');
    const modal = new bootstrap.Modal(document.getElementById('vModal'));
    let viewedVeggies = new Set();

    veggies.forEach((veg, index) => {
        const card = document.createElement('div');
        card.className = `veggie-card ${veg.theme} animate__animated animate__zoomIn`;
        card.style.animationDelay = `${index * 0.04}s`;

        card.innerHTML = `
            <span class="new-badge" id="badge-${index}">New</span>
            <div class="veggie-emoji">${veg.emoji}</div>
            <div class="veggie-name">${veg.name}</div>
        `;

        card.onclick = () => {
            document.getElementById('mEmoji').innerText = veg.emoji;
            document.getElementById('mName').innerText = veg.name;
            document.getElementById('mBenefit').innerText = `⚡ ${veg.benefit}`;
            document.getElementById('mColor').innerText = veg.color;
            document.getElementById('mFact').innerText = `"${veg.fact}"`;
            document.getElementById('mName').style.color = window.getComputedStyle(card).color;

            modal.show();

            viewedVeggies.add(index);

            const badge = document.getElementById(`badge-${index}`);
            if (badge) badge.remove();

            document.getElementById('progressInfo').innerText = `Tap all veggies to unlock the Quiz! 🔓 (${viewedVeggies.size}/${veggies.length})`;
        };
        grid.appendChild(card);
    });

    document.getElementById('vModal').addEventListener('hidden.bs.modal', function () {
        if (viewedVeggies.size === veggies.length) {
            Swal.fire({
                title: 'Awesome! 🌟',
                text: 'You checked all the vegetables! Let\'s play the quiz!',
                icon: 'success',
                timer: 2000,
                showConfirmButton: false
            }).then(() => {
                window.location.href = 'veggies-quiz.html';
            });
        }
    });

    // Profile Data Load කිරීම
    document.addEventListener("DOMContentLoaded", function() {
        const name = sessionStorage.getItem("childName");
        const gender = sessionStorage.getItem("childGender");
        const level = sessionStorage.getItem("childLevel");

        const nameElement = document.getElementById("sidebar-name");
        if (name && nameElement) nameElement.innerText = name;

        const avatarElement = document.getElementById("sidebar-avatar");
        if (gender && avatarElement) {
            const upperGender = gender.toUpperCase();
            if (upperGender === "FEMALE" || upperGender === "GIRL") {
                avatarElement.innerText = "👧";
                avatarElement.style.borderColor = "var(--rainbow-red)";
            } else {
                avatarElement.innerText = "👦";
                avatarElement.style.borderColor = "var(--rainbow-blue)";
            }
        }

        const levelElement = document.getElementById("sidebar-level");
        if (level && levelElement) levelElement.innerText = level;

        const logoutBtn = document.getElementById("logout-btn");
        if(logoutBtn) {
            logoutBtn.addEventListener("click", function() {
                sessionStorage.clear();
            });
        }
    });
</script>

</body>
</html>
