<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pretty Flowers | MiniToons EduHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

    <style>
        :root {
            /* Floral Pastel Palette */
            --flower-pink: #FCE4EC;   --txt-pink: #D81B60;
            --flower-red: #FFEBEE;    --txt-red: #C62828;
            --flower-yellow: #FFFDE7; --txt-yellow: #F9A825;
            --flower-blue: #E1F5FE;   --txt-blue: #0288D1;
            --flower-purple: #F3E5F5; --txt-purple: #7B1FA2;
            --flower-orange: #FFF3E0; --txt-orange: #EF6C00;

            --rainbow-red: #FF5E78;
            --rainbow-orange: #FF9F43;
            --rainbow-yellow: #FFD93D;
            --rainbow-green: #2ecc71;
            --rainbow-blue: #4D96FF;
            --rainbow-purple: #927DFF;
            --dark-navy: #2D3436;
            --glass: rgba(255, 255, 255, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle, #e2a8ef 0%, #e4b3ef 100%);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* 🚪 Sidebar Styles */
        .sidebar {
            background: var(--glass);
            backdrop-filter: blur(15px);
            height: 100vh;
            border-right: 1px solid rgba(0,0,0,0.08);
            padding: 25px 15px;
            position: fixed;
            width: 260px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-brand { font-family: 'Fredoka', cursive; text-align: center; margin-bottom: 25px; text-decoration: none; display: block; }
        .brand-text { display: flex; justify-content: center; line-height: 1; font-size: 2.2rem; font-weight: bolder; }

        .child-profile-box { text-align: center; background: white; border-radius: 25px; padding: 15px; margin-bottom: 20px; border: 2px solid rgba(0,0,0,0.03); cursor:pointer; }
        .avatar-img { width: 65px; height: 65px; background: #f0f4f8; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; margin: 0 auto 10px; border: 3px solid var(--rainbow-blue); }

        .nav-link-custom { transition: all 0.3s; border-left: 5px solid transparent; margin-bottom: 5px; font-weight: 700; padding: 10px 18px; border-radius: 12px; display: flex; align-items: center; text-decoration: none; color: #636e72; font-size: 0.95rem; }
        .nav-link-custom i { font-size: 1.1rem; margin-right: 12px; }

        .nav-lessons.active {
            color: var(--rainbow-green) !important;
            background: rgba(46, 204, 113, 0.08);
            border-left-color: var(--rainbow-green);
        }

        .nav-link-custom:hover {
            color: var(--rainbow-purple) !important;
            background: rgba(146, 125, 255, 0.08);
            border-left-color: var(--rainbow-purple);
            transform: translateX(5px);
        }

        .logout-container {
            margin-top: auto;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 15px;
        }

        .btn-logout {
            color: var(--rainbow-red) !important;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            padding: 12px 18px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .btn-logout:hover {
            background: rgba(255, 94, 120, 0.08);
            transform: translateX(5px);
        }

        /* 📝 Main Content Area */
        .main-content {
            margin-left: 260px;
            padding: 35px;
            flex: 1;
            height: 100vh;
            overflow-y: auto;
            text-align: center;
            position: relative;
        }

        /* Floating Garden Icons */
        .main-content::before {
            content: "🌸"; position: absolute; top: 10%; left: 5%; font-size: 3rem; opacity: 0.3; animation: float 6s infinite ease-in-out;
        }
        .main-content::after {
            content: "🦋"; position: absolute; bottom: 15%; right: 10%; font-size: 2.5rem; opacity: 0.3; animation: float 4s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Fixed High-Visibility Title - Floral Style */
        .main-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 4.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #D81B60, #EC407A, #F48FB1, #F8BBD0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            filter: drop-shadow(2px 2px 0px white);
            display: block;
        }

        .flower-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        /* Flower Cards - Floral Style */
        .flower-card {
            height: 140px;
            border-radius: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 0 rgba(0,0,0,0.05);
            border: 5px solid white;
            position: relative;
        }

        .flower-card:hover {
            transform: translateY(-10px) rotate(3deg);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .flower-emoji {
            font-size: 4rem;
            transition: 0.3s;
        }

        .flower-card:hover .flower-emoji {
            transform: scale(1.2);
        }

        .flower-name {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            margin-top: 5px;
            font-size: 1.2rem;
        }

        .new-badge {
            position: absolute; top: -5px; right: -5px;
            background: var(--rainbow-red); color: white; font-size: 0.75rem;
            padding: 3px 10px; border-radius: 12px; font-weight: 700;
        }

        /* Card Themes */
        .theme-pink { background: var(--flower-pink); color: var(--txt-pink); }
        .theme-red { background: var(--flower-red); color: var(--txt-red); }
        .theme-yellow { background: var(--flower-yellow); color: var(--txt-yellow); }
        .theme-blue { background: var(--flower-blue); color: var(--txt-blue); }
        .theme-purple { background: var(--flower-purple); color: var(--txt-purple); }
        .theme-orange { background: var(--flower-orange); color: var(--txt-orange); }

        .back-btn, .btn-quiz-unlock {
            padding: 15px 40px;
            border-radius: 50px;
            background: white;
            color: #D81B60;
            text-decoration: none;
            font-weight: 700;
            display: inline-block;
            transition: 0.3s;
            border: 3px solid #F8BBD0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .back-btn:hover {
            background: #F8BBD0;
            transform: scale(1.05);
            color: #D81B60;
        }

        .btn-quiz-unlock {
            border-color: #A5D6A7;
            color: #2E7D32;
        }

        .btn-quiz-unlock:hover {
            background: #E8F5E9;
            color: #1B5E20;
            transform: scale(1.05);
        }

        /* Modal Styling - Floral Style */
        .modal-content {
            border: none;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }

        .modal-flower { font-size: 8rem; }
        .modal-title-custom { font-family: 'Fredoka'; font-size: 4rem; }
        .pill {
            padding: 8px 20px; border-radius: 30px;
            background: #f8f9fa; font-weight: 700;
            display: inline-block; margin: 5px;
        }

        @media (max-width: 992px) { .sidebar { width: 80px; } .sidebar span, .brand-text { display: none; } .main-content { margin-left: 80px; } }
    </style>
</head>
<body>

<div class="sidebar shadow-sm">
    <a href="#" class="sidebar-brand">
        <div class="brand-text">
            <span style="color: var(--rainbow-red);">M</span><span style="color: var(--rainbow-orange);">i</span><span style="color: var(--rainbow-yellow);">n</span><span style="color: var(--rainbow-green);">i</span><span style="color: var(--rainbow-blue);">T</span><span style="color: var(--rainbow-purple);">oons</span>
        </div>
        <div class="brand-text" style="font-size:1.8rem; margin-top:-5px;">
            <span style="color: var(--dark-navy);">Edu</span><span style="color: var(--rainbow-blue);">Hub</span>🌈
        </div>
    </a>

    <a href="profile.html" class="text-decoration-none">
        <div class="child-profile-box shadow-sm" style="cursor: pointer; transition: 0.3s;">
            <div class="avatar-img" id="sidebar-avatar">👦</div>
            <h6 class="fw-bold mb-0" style="color: var(--dark-navy);" id="sidebar-name">Little Adventurer</h6>
            <small class="text-muted fw-bold" id="sidebar-level">Explorer</small>
        </div>
    </a>

    <nav class="nav-links">
        <a href="child-dashboard.html" class="nav-link-custom nav-dashboard"><i class="bi bi-grid-1x2-fill"></i> <span>Dashboard</span></a>
        <a href="lessons.html" class="nav-link-custom nav-lessons active"><i class="bi bi-book-half"></i> <span>Lessons</span></a>
        <a href="songs.html" class="nav-link-custom nav-songs"><i class="bi bi-music-note-beamed"></i> <span>Fun Songs</span></a>
        <a href="cartoons.html" class="nav-link-custom nav-cartoons"><i class="bi bi-play-circle-fill"></i> <span>Cartoons</span></a>
        <a href="quizzes.html" class="nav-link-custom nav-quizzes"><i class="bi bi-trophy-fill"></i> <span>Quizzes</span></a>
    </nav>

    <div class="logout-container">
        <a href="index.html" class="btn-logout" id="logout-btn">
            <i class="bi bi-box-arrow-right me-2"></i> <span>Logout</span>
        </a>
    </div>
</div>

<div class="main-content">
    <div>
        <h1 class="main-title animate__animated animate__pulse animate__infinite">Pretty Flowers🌸</h1>
        <p class="lead fw-bold text-muted">Click a flower to see its magic!</p>

        <div class="alert alert-info d-inline-block rounded-pill fw-bold py-1 px-4 mb-0" style="font-size: 0.9rem;" id="progressInfo">
            Tap all 10 flowers to unlock the Quiz! 🔓 (0/10)
        </div>
    </div>

    <div class="flower-grid" id="flowerGrid">
    </div>

    <div class="mt-4 mb-3 d-flex justify-content-center gap-3" id="actionButtons">
        <a href="lessons.html" class="back-btn animate__animated animate__fadeInUp">
            <i class="fas fa-chevron-left me-2"></i> Back to Lessons
        </a>
    </div>
</div>

<div class="modal fade" id="flowerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content animate__animated animate__zoomIn">
            <div class="modal-body text-center p-5">
                <button type="button" class="btn-close float-end" data-bs-dismiss="modal"></button>
                <div id="mEmoji" class="modal-flower animate__animated animate__tada animate__infinite animate__slow">🌸</div>
                <h2 id="mName" class="modal-title-custom">Rose</h2>
                <div class="mt-3">
                    <span class="pill" id="mColor" style="color: #E91E63;">💖 Pink</span>
                    <span class="pill" id="mType" style="color: #4CAF50;">🌿 Garden</span>
                </div>
                <p id="mFact" class="mt-4 fw-bold text-muted italic">"Roses are beautiful and smell amazing!"</p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    const flowers = [
        { name: "Rose", emoji: "🌹", color: "Red", type: "Garden", theme: "theme-red", fact: "Roses are symbols of love!" },
        { name: "Tulip", emoji: "🌷", color: "Pink", type: "Garden", theme: "theme-pink", fact: "Tulips bloom in spring!" },
        { name: "Sunflower", emoji: "🌻", color: "Yellow", type: "Field", theme: "theme-yellow", fact: "Sunflowers follow the sun!" },
        { name: "Lotus", emoji: "🪷", color: "White", type: "Pond", theme: "theme-blue", fact: "Lilies float on water!" },
        { name: "Orchid", emoji: "🌸", color: "Purple", type: "Orchard", theme: "theme-purple", fact: "Orchids are exotic flowers!" },
        { name: "Daisy", emoji: "🌼", color: "White", type: "Field", theme: "theme-yellow", fact: "Daisies have simple beauty!" },
        { name: "Hibiscus", emoji: "🌺", color: "Red", type: "Garden", theme: "theme-red", fact: "Hibiscus are tropical flowers!" },
        { name: "Lotus", emoji: "🪻", color: "Purple", type: "Pond", theme: "theme-purple", fact: "Lotus are sacred flowers!" },
        { name: "Marigold", emoji: "🏵️", color: "Orange", type: "Garden", theme: "theme-orange", fact: "Marigolds are vibrant flowers!" },
        { name: "Blossom", emoji: "💮", color: "White", type: "Trees", theme: "theme-pink", fact: "Blossoms show new beginnings!" }
    ];

    const grid = document.getElementById('flowerGrid');
    const modal = new bootstrap.Modal(document.getElementById('flowerModal'));

    let viewedFlowers = new Set();
    let quizButtonAdded = false;

    flowers.forEach((flower, index) => {
        const card = document.createElement('div');
        card.className = `flower-card ${flower.theme} animate__animated animate__fadeInUp`;
        card.style.animationDelay = `${index * 0.05}s`;
        card.id = `flower-${index}`;

        card.innerHTML = `
          <span class="new-badge" id="badge-${index}">New</span>
          <div class="flower-emoji">${flower.emoji}</div>
          <div class="flower-name">${flower.name}</div>
        `;

        card.onclick = () => {
            document.getElementById('mEmoji').innerText = flower.emoji;
            document.getElementById('mName').innerText = flower.name;
            document.getElementById('mColor').innerText = `💖 ${flower.color}`;
            document.getElementById('mType').innerText = `🌿 ${flower.type}`;
            document.getElementById('mFact').innerText = `"${flower.fact}"`;

            const titleColor = window.getComputedStyle(card).color;
            document.getElementById('mName').style.color = titleColor;

            modal.show();

            viewedFlowers.add(index);

            const badge = document.getElementById(`badge-${index}`);
            if (badge) badge.remove();

            document.getElementById('progressInfo').innerText = `Tap all 10 flowers to unlock the Quiz! 🔓 (${viewedFlowers.size}/10)`;

            // මල් 10 ම බැලුවට පස්සේ Quiz Button එක දානවා
            if (viewedFlowers.size === flowers.length && !quizButtonAdded) {
                const actionButtons = document.getElementById('actionButtons');
                const quizBtn = document.createElement('a');
                quizBtn.href = "flowers-quiz.html";
                quizBtn.className = "btn btn-quiz-unlock animate__animated animate__rubberBand";
                quizBtn.innerHTML = `<i class="bi bi-trophy-fill me-2"></i> Play Flowers Quiz`;
                actionButtons.appendChild(quizBtn);
                quizButtonAdded = true;
            }
        };

        grid.appendChild(card);
    });

    // Modal එක වැහුවම Quiz එකට Auto යන්න කලින් පාඩම් වල දාපු SweetAlert logic එක 👇
    document.getElementById('flowerModal').addEventListener('hidden.bs.modal', function () {
        if (viewedFlowers.size === flowers.length) {
            Swal.fire({
                title: 'Awesome! 🌟',
                text: 'You checked all the flowers! Now let\'s play the quiz!',
                icon: 'success',
                timer: 2000,
                showConfirmButton: false
            }).then(() => {
                window.location.href = "flowers-quiz.html";
            });
        }
    });

    // Load Profile Data from Session
    document.addEventListener("DOMContentLoaded", function() {
        const name = sessionStorage.getItem("childName");
        const gender = sessionStorage.getItem("childGender");
        const level = sessionStorage.getItem("childLevel");

        const nameElement = document.getElementById("sidebar-name");
        if (name && nameElement) nameElement.innerText = name;

        const avatarElement = document.getElementById("sidebar-avatar");
        if (gender && avatarElement) {
            const upperGender = gender.toUpperCase();
            if (upperGender === "FEMALE" || upperGender === "GIRL") {
                avatarElement.innerText = "👧";
                avatarElement.style.borderColor = "var(--rainbow-red)";
            } else {
                avatarElement.innerText = "👦";
                avatarElement.style.borderColor = "var(--rainbow-blue)";
            }
        }

        const levelElement = document.getElementById("sidebar-level");
        if (level && levelElement) levelElement.innerText = level;

        const logoutBtn = document.getElementById("logout-btn");
        if(logoutBtn) {
            logoutBtn.addEventListener("click", function() {
                sessionStorage.clear();
            });
        }
    });
</script>

</body>
</html>
